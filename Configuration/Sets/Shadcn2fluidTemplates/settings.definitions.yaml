categories:
  Shadcn2fluid:
    label: 'ShadCN Theme'

settings:
  shadcn2fluid.themeCss:
    label: 'Theme CSS File'
    category: Shadcn2fluid
    description: 'Path to the CSS file containing shadcn/ui color variables (:root and .dark blocks). Generate a theme at ui.shadcn.com/create, export the CSS, place it in your site package, and set the path here, e.g. EXT:site_package/Resources/Public/Css/shadcn-theme.css'
    type: string
    default: 'EXT:shadcn2fluid_templates/Resources/Public/Css/shadcn-theme.css'

  shadcn2fluid.themeSourceUrl:
    label: 'shadcn/ui Theme URL'
    category: Shadcn2fluid
    description: 'Optional reference URL of the ui.shadcn.com/create preset used to generate the exported CSS. Stored in site config for traceability only — does not affect frontend rendering.'
    type: string
    default: 'https://ui.shadcn.com/create#b2D0wqNxT'
