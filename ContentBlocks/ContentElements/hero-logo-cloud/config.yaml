name: shadcn2fluid/hero-logo-cloud
typeName: shadcn2fluid_herologocloud
title: Hero Logo Cloud
description: Hero section with supporting logo strip for proof and trust
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3
  - identifier: primary_button_text
    type: Textarea
    rows: 1
    label: Primary Button Text
  - identifier: primary_button_link
    type: Link
    label: Primary Button Link
  - identifier: logo_items
    type: Collection
    label: Logos
    fields:
      - identifier: name
        type: Textarea
        rows: 1
        label: Name
