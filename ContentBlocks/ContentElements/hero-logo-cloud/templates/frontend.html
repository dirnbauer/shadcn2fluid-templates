<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-hero-logo-cloud" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="hero-logo-cloud">
    <s2f:layout.container>
        <div class="hero-logo-cloud__content">
            <f:if condition="{data.eyebrow}">
                <span class="hero-logo-cloud__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
            </f:if>
            <f:if condition="{data.header}">
                <h1 class="hero-logo-cloud__headline">{data -> f:render.text(field: 'header')}</h1>
            </f:if>
            <f:if condition="{data.subheadline}">
                <p class="hero-logo-cloud__description">{data -> f:render.text(field: 'subheadline')}</p>
            </f:if>
            <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                <s2f:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</s2f:atom.button>
            </f:if>
        </div>
        <div class="hero-logo-cloud__logos">
            <f:for each="{data.logo_items}" as="logo">
                <span class="hero-logo-cloud__logo">{logo -> f:render.text(field: 'name')}</span>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
