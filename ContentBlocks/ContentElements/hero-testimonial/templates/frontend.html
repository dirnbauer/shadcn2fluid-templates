<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-testimonial" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-testimonial">
    <s2f:layout.container>
        <div class="hero-testimonial__grid">
            <div class="hero-testimonial__content">
                <f:if condition="{data.header}"><h1 class="hero-testimonial__headline">{data.header}</h1></f:if>
                <f:if condition="{data.subheadline}"><p class="hero-testimonial__subheadline">{data.subheadline}</p></f:if>
                <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                    <s2f:atom.button link="{data.primary_button_link}" size="lg">{data.primary_button_text}</s2f:atom.button>
                </f:if>
            </div>
            <div class="hero-testimonial__quote-card">
                <f:if condition="{data.quote}">
                    <blockquote class="hero-testimonial__quote">{data.quote}</blockquote>
                </f:if>
                <div class="hero-testimonial__author">
                    <f:if condition="{data.author_image}">
                        <f:for each="{data.author_image}" as="image">
                            <f:image image="{image}" width="48" height="48" class="hero-testimonial__avatar" alt="{data.author_name}"/>
                        </f:for>
                    </f:if>
                    <div>
                        <f:if condition="{data.author_name}"><p class="hero-testimonial__author-name">{data.author_name}</p></f:if>
                        <f:if condition="{data.author_role}"><p class="hero-testimonial__author-role">{data.author_role}</p></f:if>
                    </div>
                </div>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
