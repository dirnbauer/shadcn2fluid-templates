name: shadcn2fluid/pricing-slider
typeName: shadcn2fluid_pricingslider
title: Pricing Slider
description: Volume-based pricing with interactive range slider
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: description
    type: Textarea
    label: Description
    rows: 2

  - identifier: unit_label
    type: Textarea
    rows: 1
    label: Unit Label
    default: requests

  - identifier: tiers
    type: Collection
    label: Volume Tiers
    minItems: 2
    fields:
      - identifier: volume
        type: Textarea
        rows: 1
        label: Volume
        required: true

      - identifier: price
        type: Textarea
        rows: 1
        label: Price
        required: true

      - identifier: included_features
        type: Textarea
        rows: 1
        label: Included Features
