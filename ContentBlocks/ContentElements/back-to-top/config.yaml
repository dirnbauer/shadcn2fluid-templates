name: shadcn2fluid/back-to-top
typeName: shadcn2fluid_backtotop
title: Back to Top
description: Floating back-to-top button with smooth scroll
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: label
    type: Textarea
    rows: 1
    label: Button Label
    default: Back to top
  - identifier: show_label
    type: Checkbox
    label: Show Label Text
    default: 0
  - identifier: position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:position'
    items:
      - label: Bottom Right
        value: bottom-right
      - label: Bottom Left
        value: bottom-left
      - label: Bottom Center
        value: bottom-center
    default: bottom-right
