<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-back-to-top" href="{cb:assetPath()}/frontend.css"/>

<button type="button" class="back-to-top back-to-top--{data.position -> f:or(alternative: 'bottom-right')}"
        aria-label="{data.label -> f:or(alternative: 'Back to top')}"
        data-back-to-top="true"
        onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    <f:if condition="{data.show_label}">
        <span class="back-to-top__label">{data.label -> f:or(alternative: 'Back to top')}</span>
    </f:if>
</button>

</html>
