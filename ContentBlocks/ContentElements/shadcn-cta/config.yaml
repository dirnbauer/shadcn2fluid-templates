name: shadcn2fluid/cta
title: ShadCN Call to Action
description: Prominent call-to-action section with headline and buttons
group: common
prefixFields: false
fields:
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Style
    items:
      - label: Centered
        value: centered
      - label: Split (Text + Image)
        value: split
      - label: Banner
        value: banner
      - label: Inline
        value: inline
    default: centered

  - identifier: badge_text
    type: Text
    label: Badge Text

  - identifier: headline
    type: Text
    label: Headline
    required: true

  - identifier: description
    type: Textarea
    label: Description
    rows: 3

  - identifier: primary_button_text
    type: Text
    label: Primary Button Text

  - identifier: primary_button_link
    type: Link
    label: Primary Button Link

  - identifier: secondary_button_text
    type: Text
    label: Secondary Button Text

  - identifier: secondary_button_link
    type: Link
    label: Secondary Button Link

  - identifier: image
    type: File
    label: Image
    allowed: common-image-types
    maxitems: 1
    displayCond: 'FIELD:variant:=:split'

  - identifier: background_color
    type: Select
    renderType: selectSingle
    label: Background Style
    items:
      - label: Default
        value: default
      - label: Muted
        value: muted
      - label: Primary
        value: primary
      - label: Gradient
        value: gradient
    default: default
