name: shadcn2fluid/definition-list
title: Definition List
description: Term-definition pairs for glossaries, specs, or key-value data
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: layout
    type: Select
    renderType: selectSingle
    label: Layout
    items:
      - label: Stacked
        value: stacked
      - label: Inline
        value: inline
      - label: Grid
        value: grid
    default: stacked
  - identifier: items
    type: Collection
    label: Definitions
    minItems: 1
    fields:
      - identifier: term
        type: Text
        label: Term
        required: true
      - identifier: definition
        type: Textarea
        label: Definition
        rows: 2
        required: true
