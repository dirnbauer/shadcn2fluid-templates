name: shadcn2fluid/founder-quote
typeName: shadcn2fluid_founderquote
title: Founder Quote
description: Featured quote from a founder or CEO with portrait
group: team
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: quote
    type: Textarea
    label: Quote
    rows: 4
  - identifier: name
    type: Textarea
    rows: 1
    label: Name
  - identifier: title
    type: Textarea
    rows: 1
    label: Title
  - identifier: image
    type: File
    label: Portrait
    allowed: common-image-types
    maxitems: 1
