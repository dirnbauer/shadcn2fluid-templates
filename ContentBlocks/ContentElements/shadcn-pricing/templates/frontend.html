<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="shadcn-section shadcn-section--{data.section_layout -> f:or(alternative: 'stacked')} shadcn-pricing">
    <div class="shadcn-section__container">
        <f:if condition="{data.eyebrow} || {data.headline} || {data.subheadline}">
            <header class="shadcn-section__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="shadcn-section__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.headline}">
                    <h2 class="shadcn-section__headline">{data.headline}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-section__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="shadcn-section__body">
            <div class="shadcn-pricing__grid shadcn-pricing__grid--cols-{data.columns -> f:or(alternative: '3')}">
                <f:for each="{data.plans}" as="plan">
                    <article class="shadcn-pricing__plan shadcn-card {f:if(condition: plan.is_featured, then: 'shadcn-pricing__plan--featured')}">
                        <div class="shadcn-pricing__plan-header">
                            <f:if condition="{plan.badge_text}">
                                <div class="shadcn-pricing__badge">
                                    <f:render partial="Components/Badge" arguments="{text: plan.badge_text, variant: '{f:if(condition: plan.is_featured, then: \"default\", else: \"outline\")}'}"/>
                                </div>
                            </f:if>
                            <h3 class="shadcn-pricing__plan-name">{plan.name}</h3>
                            <div class="shadcn-pricing__price-row">
                                <span class="shadcn-pricing__plan-price">{plan.price}</span>
                                <f:if condition="{plan.billing_period}">
                                    <span class="shadcn-pricing__billing-period">{plan.billing_period}</span>
                                </f:if>
                            </div>
                            <f:if condition="{plan.description}">
                                <p class="shadcn-pricing__plan-description">{plan.description}</p>
                            </f:if>
                        </div>

                        <f:if condition="{plan.features}">
                            <ul class="shadcn-pricing__features">
                                <f:for each="{plan.features -> f:split(separator: '\n')}" as="feature">
                                    <f:if condition="{feature}">
                                        <li class="shadcn-pricing__feature">
                                            <span class="shadcn-pricing__feature-icon" aria-hidden="true">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <path d="M20 6 9 17l-5-5"/>
                                                </svg>
                                            </span>
                                            <span>{feature}</span>
                                        </li>
                                    </f:if>
                                </f:for>
                            </ul>
                        </f:if>

                        <f:if condition="{plan.button_text} && {plan.button_link.url}">
                            <div class="shadcn-pricing__footer">
                                <f:render partial="Components/Button" arguments="{
                                    link: plan.button_link,
                                    text: plan.button_text,
                                    variant: '{f:if(condition: plan.is_featured, then: \"default\", else: \"outline\")}',
                                    class: 'shadcn-pricing__button'
                                }"/>
                            </div>
                        </f:if>
                    </article>
                </f:for>
            </div>
        </div>
    </div>
</section>

</html>
