<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-hero-gradient" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="hero-gradient" style="--gradient-from: {data.gradient_from -> f:or(alternative: 'hsl(220, 70%, 50%)')}; --gradient-to: {data.gradient_to -> f:or(alternative: 'hsl(280, 70%, 50%)')}">
    <s2f:layout.container>
        <div class="hero-gradient__content">
            <f:if condition="{data.badge_text}">
                <s2f:atom.badge variant="secondary">{data.badge_text}</s2f:atom.badge>
            </f:if>
            <f:if condition="{data.header}">
                <h1 class="hero-gradient__headline">{data.header}</h1>
            </f:if>
            <f:if condition="{data.subheadline}">
                <p class="hero-gradient__subheadline">{data.subheadline}</p>
            </f:if>
            <div class="hero-gradient__actions">
                <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                    <s2f:atom.button link="{data.primary_button_link}" size="lg">{data.primary_button_text}</s2f:atom.button>
                </f:if>
                <f:if condition="{data.secondary_button_text} && {data.secondary_button_link.url}">
                    <s2f:atom.button link="{data.secondary_button_link}" variant="outline" size="lg">{data.secondary_button_text}</s2f:atom.button>
                </f:if>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
