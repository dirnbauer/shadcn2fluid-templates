<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-product-hero" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="product-hero">
    <s2f:layout.container>
        <div class="product-hero__layout">
            <div class="product-hero__content">
                <f:if condition="{data.eyebrow}">
                    <span class="product-hero__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h1 class="product-hero__headline">{data -> f:render.text(field: 'header')}</h1>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="product-hero__description">{data -> f:render.text(field: 'description')}</p>
                </f:if>
                <f:if condition="{data.price}">
                    <div class="product-hero__price-row">
                        <f:if condition="{data.price_note}">
                            <span class="product-hero__price-note">{data -> f:render.text(field: 'price_note')}</span>
                        </f:if>
                        <span class="product-hero__price">{data -> f:render.text(field: 'price')}</span>
                    </div>
                </f:if>
                <f:if condition="{data.button_text} && {data.button_link.url}">
                    <f:link.typolink parameter="{data.button_link}" class="product-hero__button">
                        {data -> f:render.text(field: 'button_text')}
                    </f:link.typolink>
                </f:if>
            </div>

            <f:if condition="{data.image}">
                <div class="product-hero__media">
                    <f:for each="{data.image}" as="fileReference">
                        <img src="{f:uri.image(image: fileReference, maxWidth: 720)}" alt="{data -> f:render.text(field: 'header')}" class="product-hero__image"/>
                    </f:for>
                </div>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
