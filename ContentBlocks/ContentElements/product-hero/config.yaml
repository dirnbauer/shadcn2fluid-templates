name: shadcn2fluid/product-hero
typeName: shadcn2fluid_product-hero
title: Product Hero
description: Full-width product hero with image, price, and CTA
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: description
    type: Textarea
    label: Description
    rows: 3

  - identifier: image
    type: File
    label: Product Image
    allowed: common-image-types
    maxitems: 1

  - identifier: price
    type: Text
    label: Price

  - identifier: price_note
    type: Text
    label: Price Note
    description: e.g. Starting at, From

  - identifier: button_text
    type: Text
    label: Button Text
    default: Buy Now

  - identifier: button_link
    type: Link
    label: Button Link
