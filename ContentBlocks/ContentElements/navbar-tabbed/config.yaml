name: shadcn2fluid/navbar-tabbed
typeName: shadcn2fluid_navbartabbed
title: Tabbed Navbar
description: Navigation with tabbed section switching
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Text
    label: Brand
    required: true
  - identifier: tabs
    type: Collection
    label: Tabs
    minItems: 1
    fields:
      - identifier: label
        type: Text
        label: Tab Label
      - identifier: link
        type: Link
        label: Tab Link
      - identifier: active
        type: Checkbox
        label: Active
  - identifier: button_text
    type: Text
    label: Button Text
  - identifier: button_link
    type: Link
    label: Button Link
