<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-team-cta" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="team-cta">
    <s2f:layout.container>
        <div class="team-cta__card">
            <f:if condition="{data.image}">
                <f:for each="{data.image}" as="fileReference">
                    <img src="{f:uri.image(image: fileReference, maxWidth: 1200)}" alt="" class="team-cta__bg"/>
                </f:for>
            </f:if>
            <div class="team-cta__content">
                <f:if condition="{data.open_count}"><span class="team-cta__count">{data.open_count} open positions</span></f:if>
                <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
                <f:if condition="{data.description}"><s2f:typography.text variant="muted">{data.description}</s2f:typography.text></f:if>
                <f:if condition="{data.cta_text} && {data.cta_link.url}">
                    <div class="team-cta__actions">
                        <s2f:atom.button link="{data.cta_link}" size="lg">{data.cta_text}</s2f:atom.button>
                    </div>
                </f:if>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
