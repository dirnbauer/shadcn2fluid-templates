name: shadcn2fluid/compliance-badges
typeName: shadcn2fluid_compliancebadges
title: Compliance Badges
description: Row of compliance and certification badges with labels
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: alignment
    type: Select
    renderType: selectSingle
    label: Alignment
    items:
      - label: Left
        value: left
      - label: Center
        value: center
      - label: Right
        value: right
    default: center
  - identifier: items
    type: Collection
    label: Badges
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Badge Image
        allowed: common-image-types
        maxitems: 1
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link
