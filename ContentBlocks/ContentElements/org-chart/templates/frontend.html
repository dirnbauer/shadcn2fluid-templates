<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      xmlns:vac="http://typo3.org/ns/Praetorius/ViteAssetCollector/ViewHelpers"
      data-namespace-typo3-fluid="true">

<vac:asset.vite entry="src/main.ts"
                manifest="EXT:shadcn2fluid_templates/Resources/Public/Vite/.vite/manifest.json" />

<section class="bg-background py-16 md:py-24">
    <div class="container mx-auto px-4">
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="mx-auto mb-12 max-w-2xl space-y-2 text-center">
                <f:if condition="{data.header}">
                    <h2 class="text-3xl font-bold tracking-tight md:text-4xl">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="text-lg text-muted-foreground">{data -> f:render.text(field: 'subheadline')}</p>
                </f:if>
            </header>
        </f:if>

        <div class="flex flex-col items-center gap-10">
            <f:for each="{data.levels}" as="level" iteration="levelIter">
                <div class="relative flex w-full flex-col items-center gap-4">
                    <f:if condition="{levelIter.isFirst} == 0">
                        <span class="absolute -top-10 left-1/2 h-10 w-px bg-border" aria-hidden="true"></span>
                    </f:if>
                    <f:if condition="{level.level_label}">
                        <span class="inline-flex items-center rounded-md border border-transparent bg-secondary px-2.5 py-0.5 text-xs font-semibold text-secondary-foreground">
                            {level -> f:render.text(field: 'level_label')}
                        </span>
                    </f:if>
                    <div class="flex flex-wrap justify-center gap-4">
                        <f:for each="{level.people -> f:split(separator: '
')}" as="personLine">
                            <f:if condition="{personLine -> f:format.trim()}">
                                <f:variable name="personParts" value="{personLine -> f:split(separator: '|')}"/>
                                <article class="min-w-[180px] rounded-lg border bg-card p-4 text-center shadow-sm">
                                    <h3 class="font-semibold leading-none tracking-tight">{personParts.0 -> f:format.trim()}</h3>
                                    <f:if condition="{personParts.1}">
                                        <p class="mt-1 text-sm text-muted-foreground">{personParts.1 -> f:format.trim()}</p>
                                    </f:if>
                                </article>
                            </f:if>
                        </f:for>
                    </div>
                </div>
            </f:for>
        </div>
    </div>
</section>

</html>
