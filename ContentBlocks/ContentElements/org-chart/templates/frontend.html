<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-org-chart" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="org-chart">
    <s2f:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="org-chart__intro">
                <f:if condition="{data.header}"><s2f:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</s2f:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><s2f:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</s2f:atom.typography></f:if>
            </header>
        </f:if>

        <div class="org-chart__levels">
            <f:for each="{data.levels}" as="level">
                <div class="org-chart__level">
                    <f:if condition="{level.level_label}"><h3 class="org-chart__level-label">{level -> f:render.text(field: 'level_label')}</h3></f:if>
                    <div class="org-chart__row">
                        <f:for each="{level.people -> f:split(separator: '
')}" as="personLine">
                            <f:if condition="{personLine -> f:trim()}">
                                <f:variable name="personParts" value="{personLine -> f:split(separator: '|')}"/>
                                <s2f:molecule.card class="org-chart__person">
                                    <h4 class="org-chart__name">{personParts.0 -> f:trim()}</h4>
                                    <f:if condition="{personParts.1}"><p class="org-chart__role">{personParts.1 -> f:trim()}</p></f:if>
                                </s2f:molecule.card>
                            </f:if>
                        </f:for>
                    </div>
                </div>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
