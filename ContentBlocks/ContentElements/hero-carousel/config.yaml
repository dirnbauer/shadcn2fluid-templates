name: shadcn2fluid/hero-carousel
typeName: shadcn2fluid_hero-carousel
title: Hero Carousel
description: Hero with rotating slides of headline, text, and image
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3
  - identifier: slides
    type: Collection
    label: Slides
    minItems: 1
    fields:
      - identifier: title
        type: Text
        label: Title
      - identifier: description
        type: Textarea
        label: Description
        rows: 2
      - identifier: image
        type: File
        label: Image
        allowed: common-image-types
        maxitems: 1
      - identifier: button_text
        type: Text
        label: Button Text
      - identifier: button_link
        type: Link
        label: Button Link
