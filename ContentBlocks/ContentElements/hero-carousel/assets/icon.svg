.hero-carousel {
    padding-block: var(--s2f-spacing-12);
    overflow: hidden;
}
.hero-carousel__track {
    position: relative;
}
.hero-carousel__slide {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: var(--s2f-spacing-8);
    align-items: center;
}
.hero-carousel__slide--active {
    display: grid;
}
.hero-carousel__title {
    font-size: var(--s2f-text-4xl);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: var(--s2f-spacing-4);
}
.hero-carousel__description {
    font-size: var(--s2f-text-lg);
    color: var(--s2f-muted-foreground);
    margin-bottom: var(--s2f-spacing-6);
}
.hero-carousel__image {
    width: 100%;
    height: auto;
    border-radius: var(--s2f-radius-lg);
}
