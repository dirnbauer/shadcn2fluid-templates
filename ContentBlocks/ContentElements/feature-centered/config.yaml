name: shadcn2fluid/feature-centered
title: Feature Centered
description: Centered single-column feature showcase with stacked items
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: eyebrow
    type: Text
    label: Eyebrow
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: items
    type: Collection
    label: Features
    minItems: 1
    fields:
      - identifier: icon
        type: Text
        label: Icon Emoji or Symbol
      - identifier: title
        type: Text
        label: Title
        required: true
      - identifier: description
        type: Textarea
        label: Description
        rows: 2
