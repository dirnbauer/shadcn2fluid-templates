<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-testimonial" href="{cb:assetPath()}/frontend.css"/>
<f:variable name="ratingInt" value="{data.rating -> f:format.number(decimals: 0)}"/>

<s2f:layout.section class="testimonial testimonial--{data.variant}">
    <s2f:layout.container>
        <f:if condition="{data.header}">
            <h2 class="testimonial__heading">{data.header}</h2>
        </f:if>

        <div class="testimonial__card {f:if(condition: '{data.variant} == \'card\'', then: 'testimonial__card--bordered')}">
            <f:if condition="{ratingInt} > 0">
                <div class="testimonial__rating">
                    <f:for each="{0: 1, 1: 2, 2: 3, 3: 4, 4: 5}" as="star">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                             fill="{f:if(condition: '{star} <= {ratingInt}', then: 'currentColor', else: 'none')}"
                             stroke="currentColor" stroke-width="2"
                             class="testimonial__star {f:if(condition: '{star} <= {ratingInt}', then: 'testimonial__star--filled')}">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                    </f:for>
                </div>
            </f:if>

            <blockquote class="testimonial__quote">
                <f:if condition="{data.variant} == 'large'">
                    <span class="testimonial__quote-mark">&ldquo;</span>
                </f:if>
                {data.quote}
            </blockquote>

            <div class="testimonial__author">
                <f:if condition="{data.author_image}">
                    <div class="testimonial__avatar">
                        <f:for each="{data.author_image}" as="fileReference">
                            <img src="{f:uri.image(image: fileReference, width: 64, height: 64)}"
                                 alt="{data.author_name}" class="testimonial__avatar-image"/>
                        </f:for>
                    </div>
                </f:if>
                <div class="testimonial__author-info">
                    <cite class="testimonial__author-name">{data.author_name}</cite>
                    <f:if condition="{data.author_title} || {data.author_company}">
                        <span class="testimonial__author-role">
                            {data.author_title}<f:if condition="{data.author_title} && {data.author_company}">, </f:if>{data.author_company}
                        </span>
                    </f:if>
                </div>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
