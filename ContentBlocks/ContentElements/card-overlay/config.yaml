name: shadcn2fluid/card-overlay
title: Card Overlay
description: Card with image background and text overlay
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: description
    type: Textarea
    label: Description
    rows: 3
  - identifier: image
    type: File
    label: Background Image
    allowed: common-image-types
    maxitems: 1
    required: true
  - identifier: link
    type: Link
    label: Card Link
  - identifier: overlay_opacity
    type: Select
    renderType: selectSingle
    label: Overlay Darkness
    items:
      - label: Light
        value: light
      - label: Medium
        value: medium
      - label: Dark
        value: dark
    default: medium
