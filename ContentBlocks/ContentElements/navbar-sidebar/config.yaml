name: shadcn2fluid/navbar-sidebar
typeName: shadcn2fluid_navbarsidebar
title: Sidebar Navbar
description: Vertical sidebar navigation with collapsible sections
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Text
    label: Brand
    required: true
  - identifier: brand_link
    type: Link
    label: Brand Link
  - identifier: sections
    type: Collection
    label: Sections
    minItems: 1
    fields:
      - identifier: title
        type: Text
        label: Section Title
      - identifier: links
        type: Textarea
        label: Links (one per line)
        rows: 5
  - identifier: footer_text
    type: Text
    label: Footer Text
