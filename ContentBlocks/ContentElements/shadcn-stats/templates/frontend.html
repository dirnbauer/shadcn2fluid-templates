<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="shadcn-section shadcn-section--{data.section_layout -> f:or(alternative: 'two-columns')} shadcn-stats">
    <div class="shadcn-section__container">
        <f:if condition="{data.eyebrow} || {data.headline} || {data.subheadline}">
            <header class="shadcn-section__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="shadcn-section__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.headline}">
                    <h2 class="shadcn-section__headline">{data.headline}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-section__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="shadcn-section__body">
            <div class="shadcn-stats__grid shadcn-stats__grid--cols-{data.columns -> f:or(alternative: '4')}">
                <f:for each="{data.stats}" as="stat">
                    <article class="shadcn-stats__item shadcn-card">
                        <div class="shadcn-stats__value">{stat.value}</div>
                        <h3 class="shadcn-stats__label">{stat.label}</h3>
                        <f:if condition="{stat.description}">
                            <p class="shadcn-stats__description">{stat.description}</p>
                        </f:if>
                    </article>
                </f:for>
            </div>
        </div>
    </div>
</section>

</html>
