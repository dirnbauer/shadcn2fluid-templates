name: shadcn2fluid/footer-mega
typeName: shadcn2fluid_footermega
title: Footer Mega
description: Large footer with brand, multiple link groups, social icons, and newsletter
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand Name
  - identifier: description
    type: Textarea
    label: Brand Description
    rows: 3
  - identifier: column_items
    type: Collection
    label: Link Groups
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Group Title
      - identifier: links
        type: Textarea
        label: Links (one per line)
        rows: 5
  - identifier: newsletter_label
    type: Textarea
    rows: 1
    label: Newsletter Label
  - identifier: copyright
    type: Textarea
    rows: 1
    label: Copyright Text
