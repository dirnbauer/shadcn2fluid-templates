<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-accordion" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="accordion-section">
    <s2f:layout.container>
        <f:if condition="{data.header}">
            <s2f:typography.heading level="2" class="accordion-section__headline">{data.header}</s2f:typography.heading>
        </f:if>

        <div class="accordion" data-allow-multiple="{f:if(condition: data.allow_multiple, then: 'true', else: 'false')}">
            <f:for each="{data.items}" as="item" iteration="iter">
                <details class="accordion__item" {f:if(condition: item.open_by_default, then: 'open')}>
                    <summary class="accordion__trigger">
                        <span class="accordion__title">{item.title}</span>
                        <span class="accordion__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m6 9 6 6 6-6"/>
                            </svg>
                        </span>
                    </summary>
                    <div class="accordion__content">
                        <f:format.html>{item.content}</f:format.html>
                    </div>
                </details>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
