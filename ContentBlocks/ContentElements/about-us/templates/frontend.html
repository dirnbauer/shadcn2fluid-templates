<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-about-us" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="about-us">
    <s2f:layout.container>
        <div class="about-us__layout">
            <div class="about-us__content">
                <f:if condition="{data.eyebrow}"><span class="about-us__eyebrow">{data.eyebrow}</span></f:if>
                <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
                <f:if condition="{data.description}"><s2f:typography.text variant="muted">{data.description}</s2f:typography.text></f:if>
                <f:if condition="{data.cta_text} && {data.cta_link.url}">
                    <div class="about-us__actions">
                        <s2f:atom.button link="{data.cta_link}" size="lg">{data.cta_text}</s2f:atom.button>
                    </div>
                </f:if>
            </div>
            <f:if condition="{data.image}">
                <div class="about-us__image-wrapper">
                    <f:for each="{data.image}" as="fileReference">
                        <img src="{f:uri.image(image: fileReference, maxWidth: 720)}" alt="" class="about-us__image"/>
                    </f:for>
                </div>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
