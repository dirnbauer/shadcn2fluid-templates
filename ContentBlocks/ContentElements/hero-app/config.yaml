name: shadcn2fluid/hero-app
typeName: shadcn2fluid_heroapp
title: Hero App
description: App download hero with device mockup placeholder
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3
  - identifier: badge_text
    type: Text
    label: Badge Text
  - identifier: app_image
    type: File
    label: App Screenshot
    allowed: common-image-types
    maxitems: 1
  - identifier: primary_button_text
    type: Text
    label: Primary Button Text
  - identifier: primary_button_link
    type: Link
    label: Primary Button Link
  - identifier: secondary_button_text
    type: Text
    label: Secondary Button Text
  - identifier: secondary_button_link
    type: Link
    label: Secondary Button Link
