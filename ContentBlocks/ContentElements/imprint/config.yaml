name: shadcn2fluid/imprint
typeName: shadcn2fluid_imprint
title: Imprint
description: Legal imprint page with company details and contact info
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: company_name
    type: Text
    label: Company Name
    required: true
  - identifier: address
    type: Textarea
    label: Address
    rows: 3
  - identifier: contact_email
    type: Text
    label: Email
  - identifier: contact_phone
    type: Text
    label: Phone
  - identifier: registry_info
    type: Textarea
    label: Registry Information
    rows: 3
  - identifier: vat_id
    type: Text
    label: VAT ID
  - identifier: additional_info
    type: Textarea
    label: Additional Information
    enableRichtext: true
    rows: 4
