name: shadcn2fluid/cookie-banner
typeName: shadcn2fluid_cookiebanner
title: Cookie Banner
description: Cookie consent banner with accept/decline and settings options
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: content
    type: Textarea
    label: Cookie Message
    enableRichtext: true
    rows: 3
    required: true
  - identifier: accept_text
    type: Textarea
    rows: 1
    label: Accept Button Text
    default: Accept All
  - identifier: decline_text
    type: Textarea
    rows: 1
    label: Decline Button Text
    default: Decline
  - identifier: settings_text
    type: Textarea
    rows: 1
    label: Settings Button Text
    default: Cookie Settings
  - identifier: settings_link
    type: Link
    label: Settings Page Link
  - identifier: position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:position'
    items:
      - label: Bottom
        value: bottom
      - label: Top
        value: top
    default: bottom
