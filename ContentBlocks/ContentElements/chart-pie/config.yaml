name: shadcn2fluid/chart-pie
typeName: shadcn2fluid_chartpie
title: Chart Pie
description: Pie chart with legend and configurable segments
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: description
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
    rows: 2
  - identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:chart_data_json'
    description: |
      Enter data as JSON array, e.g.:
      [{"label": "Segment A", "value": 40}, {"label": "Segment B", "value": 30}]
    rows: 6
    required: true
  - identifier: show_legend
    type: Checkbox
    label: Show Legend
    default: 1
  - identifier: chart_size
    type: Select
    renderType: selectSingle
    label: Chart Size
    items:
      - label: Small
        value: small
      - label: Medium
        value: medium
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.large'
        value: large
    default: medium
