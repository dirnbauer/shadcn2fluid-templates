<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:switch expression="{data.variant}">
    <f:case value="basic">
        <f:render partial="CardBasic" arguments="{data: data}"/>
    </f:case>
    <f:case value="image">
        <f:render partial="CardImage" arguments="{data: data}"/>
    </f:case>
    <f:case value="horizontal">
        <f:render partial="CardHorizontal" arguments="{data: data}"/>
    </f:case>
    <f:defaultCase>
        <f:render partial="CardBasic" arguments="{data: data}"/>
    </f:defaultCase>
</f:switch>

</html>
