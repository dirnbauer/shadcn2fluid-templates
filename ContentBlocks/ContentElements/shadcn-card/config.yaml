name: shadcn2fluid/card
title: ShadCN Card
description: Versatile card component with multiple layout variants
group: common
prefixFields: false
fields:
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Card Style
    fieldWizard:
      selectIcons:
        disabled: false
    items:
      - label: Basic
        value: basic
        icon: shadcn2fluid-card-basic
      - label: With Image
        value: image
        icon: shadcn2fluid-card-image
      - label: Horizontal
        value: horizontal
        icon: shadcn2fluid-card-horizontal
    default: basic

  - identifier: image
    type: File
    label: Card Image
    allowed: common-image-types
    maxitems: 1
    displayCond: 'FIELD:variant:!=:basic'

  - identifier: title
    type: Text
    label: Card Title
    required: true

  - identifier: description
    type: Textarea
    label: Card Description
    rows: 3

  - identifier: badge_text
    type: Text
    label: Badge Text
    description: Optional badge displayed on the card

  - identifier: link
    type: Link
    label: Card Link
    description: Makes the entire card clickable

  - identifier: button_text
    type: Text
    label: Button Text
    description: Optional button at bottom of card

  - identifier: button_link
    type: Link
    label: Button Link
    displayCond: 'FIELD:button_text:!=:'
