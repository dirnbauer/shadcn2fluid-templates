<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-company-milestones" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="company-milestones">
    <s2f:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="company-milestones__intro">
                <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
                <f:if condition="{data.subheadline}"><s2f:typography.text variant="muted">{data.subheadline}</s2f:typography.text></f:if>
            </header>
        </f:if>

        <div class="company-milestones__grid">
            <f:for each="{data.milestones}" as="ms" iteration="i">
                <article class="company-milestones__item">
                    <span class="company-milestones__number">{i.cycle}</span>
                    <f:if condition="{ms.year}"><span class="company-milestones__year">{ms.year}</span></f:if>
                    <h3 class="company-milestones__title">{ms.title}</h3>
                    <f:if condition="{ms.description}"><p class="company-milestones__description">{ms.description}</p></f:if>
                </article>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
