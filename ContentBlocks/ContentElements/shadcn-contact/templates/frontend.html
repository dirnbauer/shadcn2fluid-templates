<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="shadcn-section shadcn-section--{data.section_layout -> f:or(alternative: 'two-columns')} shadcn-contact">
    <div class="shadcn-section__container">
        <f:if condition="{data.eyebrow} || {data.headline} || {data.subheadline}">
            <header class="shadcn-section__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="shadcn-section__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.headline}">
                    <h2 class="shadcn-section__headline">{data.headline}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-section__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="shadcn-section__body">
            <div class="shadcn-contact__grid">
                <div class="shadcn-contact__info shadcn-card">
                    <div class="shadcn-card__header">
                        <f:if condition="{data.info_title}">
                            <h3 class="shadcn-card__title">{data.info_title}</h3>
                        </f:if>
                        <f:if condition="{data.info_text}">
                            <p class="shadcn-card__description">{data.info_text}</p>
                        </f:if>
                    </div>
                    <f:if condition="{data.contact_items}">
                        <div class="shadcn-card__content">
                            <ul class="shadcn-contact__list">
                                <f:for each="{data.contact_items}" as="item">
                                    <li class="shadcn-contact__list-item">
                                        <span class="shadcn-contact__list-label">{item.label}</span>
                                        <f:if condition="{item.link.url}">
                                            <f:then>
                                                <f:link.typolink parameter="{item.link}" class="shadcn-contact__list-value">{item.value}</f:link.typolink>
                                            </f:then>
                                            <f:else>
                                                <span class="shadcn-contact__list-value">{item.value}</span>
                                            </f:else>
                                        </f:if>
                                    </li>
                                </f:for>
                            </ul>
                        </div>
                    </f:if>
                </div>

                <div class="shadcn-contact__form-card shadcn-card">
                    <div class="shadcn-card__header">
                        <f:if condition="{data.form_title}">
                            <h3 class="shadcn-card__title">{data.form_title}</h3>
                        </f:if>
                        <f:if condition="{data.form_description}">
                            <p class="shadcn-card__description">{data.form_description}</p>
                        </f:if>
                    </div>
                    <div class="shadcn-card__content">
                        <form class="shadcn-contact__form" action="{data.form_action.url}" method="{data.form_method -> f:or(alternative: 'post')}">
                            <div class="shadcn-contact__field-grid">
                                <label class="shadcn-contact__field">
                                    <span class="shadcn-contact__label">Name</span>
                                    <input class="shadcn-contact__input" type="text" name="name" placeholder="Your name"/>
                                </label>

                                <label class="shadcn-contact__field">
                                    <span class="shadcn-contact__label">Email</span>
                                    <input class="shadcn-contact__input" type="email" name="email" placeholder="you@example.com"/>
                                </label>

                                <f:if condition="{data.show_company_field}">
                                    <label class="shadcn-contact__field">
                                        <span class="shadcn-contact__label">Company</span>
                                        <input class="shadcn-contact__input" type="text" name="company" placeholder="Company name"/>
                                    </label>
                                </f:if>

                                <f:if condition="{data.show_phone_field}">
                                    <label class="shadcn-contact__field">
                                        <span class="shadcn-contact__label">Phone</span>
                                        <input class="shadcn-contact__input" type="tel" name="phone" placeholder="+43 ..."/>
                                    </label>
                                </f:if>
                            </div>

                            <label class="shadcn-contact__field">
                                <span class="shadcn-contact__label">Message</span>
                                <textarea class="shadcn-contact__textarea" name="message" rows="6" placeholder="Tell us about your project"></textarea>
                            </label>

                            <f:if condition="{data.privacy_text}">
                                <p class="shadcn-contact__privacy">{data.privacy_text}</p>
                            </f:if>

                            <div class="shadcn-contact__actions">
                                <f:render partial="Components/Button" arguments="{text: '{data.submit_text -> f:or(alternative: \"Send inquiry\")}', type: 'submit', class: 'shadcn-contact__submit'}"/>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</html>
