name: shadcn2fluid/contact
title: ShadCN Contact
description: Contact section with info cards and lead form layout
group: common
prefixFields: false
fields:
  - identifier: section_layout
    type: Select
    renderType: selectSingle
    label: Template Layout
    items:
      - label: Full Width
        value: full-width
      - label: Two Columns
        value: two-columns
      - label: Stacked
        value: stacked
    default: two-columns

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: headline
    type: Text
    label: Section Headline

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 3

  - identifier: info_title
    type: Text
    label: Info Panel Title

  - identifier: info_text
    type: Textarea
    label: Info Panel Text
    rows: 3

  - identifier: contact_items
    type: Collection
    label: Contact Items
    fields:
      - identifier: label
        type: Text
        label: Label
        required: true

      - identifier: value
        type: Text
        label: Value
        required: true

      - identifier: link
        type: Link
        label: Optional Link

  - identifier: form_title
    type: Text
    label: Form Title
    default: Send us a message

  - identifier: form_description
    type: Textarea
    label: Form Description
    rows: 2

  - identifier: form_action
    type: Link
    label: Form Action URL
    description: Leave empty to post to the current page

  - identifier: form_method
    type: Select
    renderType: selectSingle
    label: Form Method
    items:
      - label: POST
        value: post
      - label: GET
        value: get
    default: post

  - identifier: submit_text
    type: Text
    label: Submit Button Text
    default: Send inquiry

  - identifier: privacy_text
    type: Textarea
    label: Privacy Hint
    rows: 2

  - identifier: show_company_field
    type: Checkbox
    label: Show Company Field
    default: 1

  - identifier: show_phone_field
    type: Checkbox
    label: Show Phone Field
    default: 1
