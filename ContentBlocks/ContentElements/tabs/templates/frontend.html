<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-tabs" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="tabs-section">
    <s2f:layout.container>
        <f:if condition="{data.header}">
            <s2f:atom.typography tag="h2" variant="h2" class="tabs-section__headline">{data.header}</s2f:atom.typography>
        </f:if>

        <div class="tabs" role="tablist">
            <div class="tabs__list">
                <f:for each="{data.items}" as="item" iteration="iter">
                    <button class="tabs__trigger {f:if(condition: iter.isFirst, then: 'tabs__trigger--active')}"
                            role="tab"
                            aria-selected="{f:if(condition: iter.isFirst, then: 'true', else: 'false')}"
                            data-tab="tab-{data.uid}-{iter.index}">{item.tab_label}</button>
                </f:for>
            </div>

            <f:for each="{data.items}" as="item" iteration="iter">
                <div class="tabs__panel {f:if(condition: iter.isFirst, then: 'tabs__panel--active')}"
                     role="tabpanel"
                     id="tab-{data.uid}-{iter.index}">
                    <f:format.html>{item.content}</f:format.html>
                </div>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
