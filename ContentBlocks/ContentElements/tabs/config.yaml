name: shadcn2fluid/tabs
typeName: shadcn2fluid_tabs
title: Tabs
description: Tabbed content panels for organizing related information
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: items
    type: Collection
    label: Tab Panels
    minItems: 2
    fields:
      - identifier: tab_label
        type: Text
        label: Tab Label
        required: true
      - identifier: content
        type: Textarea
        label: Content
        enableRichtext: true
        rows: 6
        required: true
