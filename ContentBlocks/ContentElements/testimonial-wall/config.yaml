name: shadcn2fluid/testimonial-wall
typeName: shadcn2fluid_testimonialwall
title: Testimonial Wall
description: Masonry-style wall of customer testimonials
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:eyebrow'

  - identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2

  - identifier: testimonials
    type: Collection
    label: Testimonials
    minItems: 3
    fields:
      - identifier: quote
        type: Textarea
        label: Quote
        rows: 3
        required: true

      - identifier: author_name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:author_name'
        required: true

      - identifier: author_title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:author_title'

      - identifier: author_image
        type: File
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:author_photo'
        allowed: common-image-types
        maxitems: 1
