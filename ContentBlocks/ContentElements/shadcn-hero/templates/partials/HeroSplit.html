<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      data-namespace-typo3-fluid="true">
<!--
    ShadCN Hero - Split Variant
    
    A two-column hero section with text on one side and an image on the other.
    Image position can be configured (left or right).
-->

<f:variable name="imagePositionClass" value="{f:if(condition: '{data.image_position} == \"left\"', then: 'shadcn-hero--image-left', else: '')}"/>

<section class="shadcn-hero shadcn-hero--split {imagePositionClass}">
    <div class="shadcn-hero__container">
        <div class="shadcn-hero__grid">
            
            <f:comment><!-- Text Content --></f:comment>
            <div class="shadcn-hero__content">
                
                <f:comment><!-- Optional Badge --></f:comment>
                <f:if condition="{data.badge_text}">
                    <span class="shadcn-badge shadcn-badge--secondary">
                        {data.badge_text}
                    </span>
                </f:if>
                
                <f:comment><!-- Headline --></f:comment>
                <f:if condition="{data.headline}">
                    <h1 class="shadcn-hero__headline">
                        {data.headline}
                    </h1>
                </f:if>
                
                <f:comment><!-- Subheadline --></f:comment>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-hero__subheadline">
                        {data.subheadline}
                    </p>
                </f:if>
                
                <f:comment><!-- CTA Buttons --></f:comment>
                <f:if condition="{data.primary_button_text} || {data.secondary_button_text}">
                    <div class="shadcn-hero__actions">
                        <f:if condition="{data.primary_button_text}">
                            <f:if condition="{data.primary_button_link.url}">
                                <f:link.typolink parameter="{data.primary_button_link}" 
                                                 class="shadcn-btn shadcn-btn--{data.primary_button_variant -> f:or(alternative: 'default')} shadcn-btn--lg">
                                    {data.primary_button_text}
                                </f:link.typolink>
                            </f:if>
                        </f:if>
                        
                        <f:if condition="{data.secondary_button_text}">
                            <f:if condition="{data.secondary_button_link.url}">
                                <f:link.typolink parameter="{data.secondary_button_link}" 
                                                 class="shadcn-btn shadcn-btn--{data.secondary_button_variant -> f:or(alternative: 'outline')} shadcn-btn--lg">
                                    {data.secondary_button_text}
                                </f:link.typolink>
                            </f:if>
                        </f:if>
                    </div>
                </f:if>
                
            </div>
            
            <f:comment><!-- Hero Image --></f:comment>
            <f:if condition="{data.hero_image}">
                <div class="shadcn-hero__image-wrapper">
                    <f:for each="{data.hero_image}" as="fileReference">
                        <img src="{f:uri.image(image: fileReference)}" 
                             alt="{fileReference.alternative -> f:or(alternative: data.headline)}" 
                             class="shadcn-hero__image" />
                    </f:for>
                </div>
            </f:if>
            
        </div>
    </div>
</section>

</html>
