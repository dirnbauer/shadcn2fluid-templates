name: shadcn2fluid/hero
title: ShadCN Hero Section
description: Modern hero section with multiple layout variants inspired by shadcn/ui
group: common
prefixFields: false
fields:
  # Variant selector - determines layout and which fields are shown
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Layout Variant
    description: Choose the hero layout style
    onChange: reload
    fieldWizard:
      selectIcons:
        disabled: false
    items:
      - label: Centered
        value: centered
        icon: shadcn2fluid-hero-centered
      - label: Split (Text + Image)
        value: split
        icon: shadcn2fluid-hero-split
      - label: Background Image
        value: background
        icon: shadcn2fluid-hero-background
    default: centered

  # Common fields for all variants
  - identifier: badge_text
    type: Text
    label: Badge Text
    description: Optional badge displayed above the headline

  - identifier: headline
    type: Text
    label: Headline
    required: true

  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3

  # Primary CTA Button
  - identifier: primary_button_text
    type: Text
    label: Primary Button Text

  - identifier: primary_button_link
    type: Link
    label: Primary Button Link

  - identifier: primary_button_variant
    type: Select
    renderType: selectSingle
    label: Primary Button Style
    items:
      - label: Default (Filled)
        value: default
      - label: Secondary
        value: secondary
      - label: Outline
        value: outline
    default: default
    displayCond: 'FIELD:primary_button_text:!=:'

  # Secondary CTA Button
  - identifier: secondary_button_text
    type: Text
    label: Secondary Button Text

  - identifier: secondary_button_link
    type: Link
    label: Secondary Button Link

  - identifier: secondary_button_variant
    type: Select
    renderType: selectSingle
    label: Secondary Button Style
    items:
      - label: Default (Filled)
        value: default
      - label: Secondary
        value: secondary
      - label: Outline
        value: outline
      - label: Ghost
        value: ghost
    default: outline
    displayCond: 'FIELD:secondary_button_text:!=:'

  # Hero Image - shown for split and background variants
  - identifier: hero_image
    type: File
    label: Hero Image
    allowed: common-image-types
    maxitems: 1
    displayCond: 'FIELD:variant:!=:centered'

  # Split variant specific fields
  - identifier: image_position
    type: Select
    renderType: selectSingle
    label: Image Position
    items:
      - label: Right
        value: right
      - label: Left
        value: left
    default: right
    displayCond: 'FIELD:variant:=:split'

  # Background variant specific fields
  - identifier: overlay_opacity
    type: Select
    renderType: selectSingle
    label: Overlay Opacity
    description: Darkness of the overlay on the background image
    items:
      - label: None (0%)
        value: '0'
      - label: Light (30%)
        value: '0.3'
      - label: Medium (50%)
        value: '0.5'
      - label: Heavy (70%)
        value: '0.7'
      - label: Dark (85%)
        value: '0.85'
    default: '0.5'
    displayCond: 'FIELD:variant:=:background'

  - identifier: text_alignment
    type: Select
    renderType: selectSingle
    label: Text Alignment
    items:
      - label: Left
        value: left
      - label: Center
        value: center
    default: left
    displayCond: 'FIELD:variant:=:background'
