name: shadcn2fluid/file-download
typeName: shadcn2fluid_filedownload
title: File Download
description: Downloadable file cards with metadata and download links
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: items
    type: Collection
    label: Files
    minItems: 1
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:title'
        required: true
      - identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
      - identifier: file
        type: File
        label: File
        maxitems: 1
        required: true
      - identifier: file_size
        type: Textarea
        rows: 1
        label: File Size
        description: e.g. 2.4 MB
