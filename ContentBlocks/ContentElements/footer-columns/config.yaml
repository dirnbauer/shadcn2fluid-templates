name: shadcn2fluid/footer-columns
typeName: shadcn2fluid_footercolumns
title: Footer Columns
description: Multi-column footer with grouped link sections
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand Name
  - identifier: description
    type: Textarea
    label: Brand Description
    rows: 3
  - identifier: column_items
    type: Collection
    label: Link Columns
    minItems: 1
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Column Title
        required: true
      - identifier: links
        type: Textarea
        label: Links (one per line)
        rows: 5
  - identifier: copyright
    type: Textarea
    rows: 1
    label: Copyright Text
