<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-footer-columns" href="{cb:assetPath()}/frontend.css"/>

<footer class="footer-columns">
    <s2f:layout.container>
        <div class="footer-columns__grid">
            <div class="footer-columns__brand">
                <f:if condition="{data.brand}">
                    <h2 class="footer-columns__title">{data.brand}</h2>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="footer-columns__description">{data.description}</p>
                </f:if>
            </div>
            <f:for each="{data.column_items}" as="col">
                <nav class="footer-columns__col">
                    <h3 class="footer-columns__col-title">{col.title}</h3>
                    <ul class="footer-columns__links">
                        <f:for each="{col.links -> f:split(separator: '
')}" as="linkLine">
                            <f:if condition="{linkLine -> f:trim()}">
                                <li><span class="footer-columns__link">{linkLine -> f:trim()}</span></li>
                            </f:if>
                        </f:for>
                    </ul>
                </nav>
            </f:for>
        </div>
        <f:if condition="{data.copyright}">
            <div class="footer-columns__bottom">
                <p class="footer-columns__copyright">{data.copyright}</p>
            </div>
        </f:if>
    </s2f:layout.container>
</footer>

</html>
