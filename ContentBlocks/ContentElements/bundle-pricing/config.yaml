name: shadcn2fluid/bundle-pricing
typeName: shadcn2fluid_bundlepricing
title: Bundle Pricing
description: Product bundle with combined pricing and savings
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:eyebrow'

  - identifier: bundle_price
    type: Textarea
    rows: 1
    label: Bundle Price
    required: true

  - identifier: savings_text
    type: Textarea
    rows: 1
    label: Savings Text
    description: e.g. Save 30%

  - identifier: description
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
    rows: 2

  - identifier: items
    type: Collection
    label: Bundle Items
    minItems: 2
    fields:
      - identifier: name
        type: Textarea
        rows: 1
        label: Item Name
        required: true

      - identifier: individual_price
        type: Textarea
        rows: 1
        label: Individual Price

      - identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:short_description'

  - identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:button_text'
    default: Get the Bundle

  - identifier: button_link
    type: Link
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:button_link'
