name: shadcn2fluid/feature-split
typeName: shadcn2fluid_featuresplit
title: Feature Split
description: Two-column split layout with feature list and media
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: description
    type: Textarea
    label: Description
    rows: 3
  - identifier: image
    type: File
    label: Side Image
    allowed: common-image-types
    maxitems: 1
  - identifier: items
    type: Collection
    label: Feature Points
    minItems: 1
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
        required: true
      - identifier: description_text
        type: Textarea
        rows: 1
        label: Description
