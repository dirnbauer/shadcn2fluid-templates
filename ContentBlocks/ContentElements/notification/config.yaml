name: shadcn2fluid/notification
typeName: shadcn2fluid_notification
title: Notification
description: Toast-style notification with icon, message, and action button
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: content
    type: Textarea
    label: Message
    rows: 3
    required: true
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Type
    items:
      - label: Info
        value: info
      - label: Success
        value: success
      - label: Warning
        value: warning
      - label: Error
        value: error
    default: info
  - identifier: action_text
    type: Text
    label: Action Button Text
  - identifier: action_link
    type: Link
    label: Action Button Link
  - identifier: dismissible
    type: Checkbox
    label: Dismissible
    default: 1
