name: shadcn2fluid/notification
typeName: shadcn2fluid_notification
title: Notification
description: Toast-style notification with icon, message, and action button
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: content
    type: Textarea
    label: Message
    rows: 3
    required: true
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Type
    items:
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.info'
        value: info
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.success'
        value: success
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.warning'
        value: warning
      - label: Error
        value: error
    default: info
  - identifier: action_text
    type: Textarea
    rows: 1
    label: Action Button Text
  - identifier: action_link
    type: Link
    label: Action Button Link
  - identifier: dismissible
    type: Checkbox
    label: Dismissible
    default: 1
