name: shadcn2fluid/navbar-stacked
typeName: shadcn2fluid_navbarstacked
title: Stacked Navbar
description: Two-row navigation with brand on top and links below
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand
    required: true
  - identifier: brand_link
    type: Link
    label: Brand Link
  - identifier: tagline
    type: Textarea
    rows: 1
    label: Tagline
  - identifier: nav_items
    type: Collection
    label: Navigation Items
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
      - identifier: link
        type: Link
        label: Link
  - identifier: button_text
    type: Textarea
    rows: 1
    label: Button Text
  - identifier: button_link
    type: Link
    label: Button Link
