<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-chart-sparkline" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="chart-sparkline-section">
    <s2f:layout.container>
        <div class="chart-sparkline chart-sparkline--{data.color_variant -> f:or(alternative: 'primary')}"
             data-chart-json="{data.chart_data -> f:format.htmlspecialchars()}">
            <div class="chart-sparkline__card">
                <div class="chart-sparkline__head">
                    <div class="chart-sparkline__titles">
                        <f:if condition="{data.header}">
                            <h3 class="chart-sparkline__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart-sparkline__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                    <f:if condition="{data.trend_badge}">
                        <span class="chart-sparkline__badge">{data -> f:render.text(field: 'trend_badge')}</span>
                    </f:if>
                </div>
                <div class="chart-sparkline__plot">
                    <svg class="chart-sparkline__svg" id="chart-sparkline-svg-{data.uid}" role="img" aria-hidden="true"></svg>
                </div>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

<script>
(function () {
  const uid = {data.uid};
  const svg = document.getElementById('chart-sparkline-svg-' + uid);
  const root = svg && svg.closest('.chart-sparkline');
  if (!svg || !root) return;
  const raw = root.getAttribute('data-chart-json');
  if (!raw) return;
  let data;
  try { data = JSON.parse(raw); } catch (e) { return; }
  const vals = Array.isArray(data)
    ? data.map(function (d) { return typeof d === 'number' ? d : (d && d.value != null ? Number(d.value) : NaN); }).filter(function (v) { return !isNaN(v); })
    : [];
  if (!vals.length) return;
  const w = 400, h = 56, pad = 4;
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  const max = Math.max.apply(null, vals);
  const min = Math.min.apply(null, vals);
  const range = max - min || 1;
  const pts = vals.map(function (v, i) {
    const x = pad + (vals.length === 1 ? (w - 2 * pad) / 2 : (i / (vals.length - 1)) * (w - 2 * pad));
    const y = h - pad - ((v - min) / range) * (h - 2 * pad);
    return [x, y];
  });
  const linePts = pts.map(function (p) { return p[0] + ' ' + p[1]; }).join(' ');
  const fillPts = '0 ' + h + ' ' + linePts + ' ' + w + ' ' + h;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke', 'currentColor');
  line.setAttribute('stroke-width', '2');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-linejoin', 'round');
  line.setAttribute('points', linePts);
  const area = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  area.setAttribute('fill', 'currentColor');
  area.setAttribute('opacity', '0.12');
  area.setAttribute('points', fillPts);
  svg.appendChild(area);
  svg.appendChild(line);
})();
</script>

</html>
