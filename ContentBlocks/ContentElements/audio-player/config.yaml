name: shadcn2fluid/audio-player
typeName: shadcn2fluid_audioplayer
title: Audio Player
description: Embedded audio player with title and description
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: description
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
    rows: 2
  - identifier: audio_file
    type: File
    label: Audio File
    allowed: common-media-types
    maxitems: 1
    required: true
  - identifier: show_download
    type: Checkbox
    label: Show Download Link
    default: 0
