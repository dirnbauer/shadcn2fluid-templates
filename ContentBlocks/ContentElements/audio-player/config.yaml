name: shadcn2fluid/audio-player
title: Audio Player
description: Embedded audio player with title and description
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: description
    type: Textarea
    label: Description
    rows: 2
  - identifier: audio_file
    type: File
    label: Audio File
    allowed: common-media-types
    maxitems: 1
    required: true
  - identifier: show_download
    type: Checkbox
    label: Show Download Link
    default: 0
