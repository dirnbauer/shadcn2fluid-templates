name: shadcn2fluid/footer-brand
typeName: shadcn2fluid_footerbrand
title: Footer Brand
description: Brand-focused footer with large logo, tagline, and links
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: logo
    type: File
    label: Logo
    allowed: common-image-types
    maxitems: 1
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand Name
  - identifier: tagline
    type: Textarea
    rows: 1
    label: Tagline
  - identifier: link_items
    type: Collection
    label: Links
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link
  - identifier: copyright
    type: Textarea
    rows: 1
    label: Copyright Text
