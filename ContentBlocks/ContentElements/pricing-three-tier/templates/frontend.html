<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-pricing-three-tier" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="pricing-three-tier">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="pricing-three-tier__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="pricing-three-tier__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="pricing-three-tier__headline">{data.header}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="pricing-three-tier__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="pricing-three-tier__grid">
            <f:for each="{data.plans}" as="plan">
                <article class="pricing-three-tier__plan {f:if(condition: plan.is_recommended, then: 'pricing-three-tier__plan--recommended')}">
                    <f:if condition="{plan.is_recommended}">
                        <span class="pricing-three-tier__badge">Recommended</span>
                    </f:if>
                    <h3 class="pricing-three-tier__name">{plan.name}</h3>
                    <div class="pricing-three-tier__price-row">
                        <span class="pricing-three-tier__price">{plan.price}</span>
                        <f:if condition="{plan.billing_period}">
                            <span class="pricing-three-tier__period">{plan.billing_period}</span>
                        </f:if>
                    </div>
                    <f:if condition="{plan.description}">
                        <p class="pricing-three-tier__plan-desc">{plan.description}</p>
                    </f:if>
                    <f:if condition="{plan.features}">
                        <ul class="pricing-three-tier__features">
                            <f:for each="{plan.features -> f:split(separator: '\n')}" as="feature">
                                <f:if condition="{feature}">
                                    <li class="pricing-three-tier__feature">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
                                        <span>{feature}</span>
                                    </li>
                                </f:if>
                            </f:for>
                        </ul>
                    </f:if>
                    <f:if condition="{plan.button_text} && {plan.button_link.url}">
                        <f:link.typolink parameter="{plan.button_link}" class="pricing-three-tier__button {f:if(condition: plan.is_recommended, then: 'pricing-three-tier__button--primary', else: 'pricing-three-tier__button--outline')}">
                            {plan.button_text}
                        </f:link.typolink>
                    </f:if>
                </article>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
