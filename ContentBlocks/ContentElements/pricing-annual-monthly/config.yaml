name: shadcn2fluid/pricing-annual-monthly
title: Pricing Annual Monthly
description: Pricing cards with annual and monthly price display and savings badge
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2

  - identifier: plans
    type: Collection
    label: Plans
    minItems: 1
    fields:
      - identifier: name
        type: Text
        label: Plan Name
        required: true

      - identifier: monthly_price
        type: Text
        label: Monthly Price
        required: true

      - identifier: annual_price
        type: Text
        label: Annual Price
        required: true

      - identifier: savings
        type: Text
        label: Savings Badge
        description: e.g. Save 20%

      - identifier: features_list
        type: Textarea
        label: Features (one per line)
        rows: 5

      - identifier: is_featured
        type: Checkbox
        label: Featured Plan

      - identifier: button_text
        type: Text
        label: Button Text
        default: Get Started

      - identifier: button_link
        type: Link
        label: Button Link
