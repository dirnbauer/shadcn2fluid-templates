name: shadcn2fluid/feature-timeline
typeName: shadcn2fluid_featuretimeline
title: Feature Timeline
description: Vertical timeline showcasing features with progressive steps
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: items
    type: Collection
    label: Timeline Steps
    minItems: 2
    fields:
      - identifier: step
        type: Textarea
        rows: 1
        label: Step Label
        required: true
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
        required: true
      - identifier: description
        type: Textarea
        label: Description
        rows: 3
