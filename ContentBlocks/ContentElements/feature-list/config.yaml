name: shadcn2fluid/feature-list
typeName: shadcn2fluid_featurelist
title: Feature List
description: Editorial feature list with icon, title, and description rows
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3

  - identifier: layout
    type: Select
    renderType: selectSingle
    label: Layout
    items:
      - label: Full Width
        value: full-width
      - label: Two Columns
        value: two-columns
      - label: Stacked
        value: stacked
    default: two-columns

  - identifier: items
    type: Collection
    label: Feature Items
    minItems: 1
    fields:
      - identifier: icon
        type: Textarea
        rows: 1
        label: Icon Label
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
      - identifier: description
        type: Textarea
        label: Description
        rows: 2
