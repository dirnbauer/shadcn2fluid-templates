name: shadcn2fluid/footer
title: Footer
description: Footer block with brand text, navigation links, and utility links
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: layout
    type: Select
    renderType: selectSingle
    label: Layout
    items:
      - label: Full Width
        value: full-width
      - label: Two Columns
        value: two-columns
      - label: Stacked
        value: stacked
    default: two-columns

  - identifier: brand
    type: Text
    label: Brand
    required: true

  - identifier: description
    type: Textarea
    label: Description
    rows: 3

  - identifier: copyright
    type: Text
    label: Copyright Text

  - identifier: footer_links
    type: Collection
    label: Footer Links
    fields:
      - identifier: label
        type: Text
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link

  - identifier: utility_links
    type: Collection
    label: Utility Links
    fields:
      - identifier: label
        type: Text
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link
