name: shadcn2fluid/textmedia
title: Text with Media
description: Text content with image or video in flexible layouts
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: layout
    type: Select
    renderType: selectSingle
    label: Layout
    items:
      - label: Media Right
        value: media-right
      - label: Media Left
        value: media-left
      - label: Media Above
        value: media-above
      - label: Media Below
        value: media-below
    default: media-right

  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2

  - identifier: content
    type: Textarea
    label: Content
    enableRichtext: true
    rows: 6

  - identifier: media
    type: File
    label: Image or Video
    allowed: common-media-types
    maxitems: 1

  - identifier: media_rounded
    type: Checkbox
    label: Rounded Corners on Media
    default: 1

  - identifier: button_text
    type: Text
    label: Button Text

  - identifier: button_link
    type: Link
    label: Button Link
