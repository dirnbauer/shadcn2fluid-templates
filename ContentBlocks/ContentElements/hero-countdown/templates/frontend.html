<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-countdown" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-countdown">
    <s2f:layout.container>
        <div class="hero-countdown__content">
            <f:if condition="{data.badge_text}"><s2f:atom.badge variant="secondary">{data -> f:render.text(field: 'badge_text')}</s2f:atom.badge></f:if>
            <f:if condition="{data.header}"><h1 class="hero-countdown__headline">{data -> f:render.text(field: 'header')}</h1></f:if>
            <f:if condition="{data.subheadline}"><p class="hero-countdown__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
            <div class="hero-countdown__timer">
                <div class="hero-countdown__unit"><span class="hero-countdown__value">00</span><span class="hero-countdown__label">Days</span></div>
                <div class="hero-countdown__unit"><span class="hero-countdown__value">00</span><span class="hero-countdown__label">Hours</span></div>
                <div class="hero-countdown__unit"><span class="hero-countdown__value">00</span><span class="hero-countdown__label">Minutes</span></div>
                <div class="hero-countdown__unit"><span class="hero-countdown__value">00</span><span class="hero-countdown__label">Seconds</span></div>
            </div>
            <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                <s2f:atom.button link="{data.primary_button_link}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</s2f:atom.button>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
