<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-pricing-comparison" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="pricing-comparison">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="pricing-comparison__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="pricing-comparison__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="pricing-comparison__headline">{data.header}</h2>
                </f:if>
            </header>
        </f:if>

        <div class="pricing-comparison__table-wrap">
            <table class="pricing-comparison__table">
                <thead>
                    <tr>
                        <th class="pricing-comparison__feature-col">Feature</th>
                        <f:for each="{data.plans}" as="plan">
                            <th class="pricing-comparison__plan-col">
                                <span class="pricing-comparison__plan-name">{plan.name}</span>
                                <f:if condition="{plan.price}">
                                    <span class="pricing-comparison__plan-price">{plan.price}</span>
                                </f:if>
                            </th>
                        </f:for>
                    </tr>
                </thead>
                <tbody>
                    <f:for each="{data.features}" as="row">
                        <tr>
                            <td class="pricing-comparison__feature-name">{row.feature_name}</td>
                            <f:for each="{row.tier_values -> f:split(separator: ',')}" as="val">
                                <td class="pricing-comparison__cell">{val -> f:format.trim()}</td>
                            </f:for>
                        </tr>
                    </f:for>
                </tbody>
            </table>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
