name: shadcn2fluid/review-carousel
typeName: shadcn2fluid_reviewcarousel
title: Review Carousel
description: Sliding carousel of customer reviews with ratings
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:eyebrow'

  - identifier: reviews
    type: Collection
    label: Reviews
    minItems: 2
    fields:
      - identifier: reviewer_name
        type: Textarea
        rows: 1
        label: Reviewer Name
        required: true

      - identifier: reviewer_image
        type: File
        label: Reviewer Photo
        allowed: common-image-types
        maxitems: 1

      - identifier: rating
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:rating'
        items:
          - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.5_stars'
            value: '5'
          - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.4_stars'
            value: '4'
          - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.3_stars'
            value: '3'
        default: '5'

      - identifier: title
        type: Textarea
        rows: 1
        label: Review Title

      - identifier: review_text
        type: Textarea
        label: Review Text
        rows: 3
        required: true

      - identifier: date
        type: Textarea
        rows: 1
        label: Date
