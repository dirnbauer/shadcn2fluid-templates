<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-cta-gradient" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="cta-gradient">
    <s2f:layout.container>
        <div class="cta-gradient__card">
            <div class="cta-gradient__content">
                <f:if condition="{data.header}"><h2 class="cta-gradient__headline">{data -> f:render.text(field: 'header')}</h2></f:if>
                <f:if condition="{data.description}"><p class="cta-gradient__description">{data -> f:render.text(field: 'description')}</p></f:if>
                <f:if condition="{data.cta_text} && {data.cta_link.url}">
                    <s2f:atom.button link="{data.cta_link}" variant="secondary" size="lg">{data -> f:render.text(field: 'cta_text')}</s2f:atom.button>
                </f:if>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
