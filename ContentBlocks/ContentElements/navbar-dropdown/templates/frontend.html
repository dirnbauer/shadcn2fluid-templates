<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-navbar-dropdown" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="navbar-dropdown">
    <s2f:layout.container>
        <nav class="navbar-dropdown__inner" aria-label="Dropdown navigation">
            <div class="navbar-dropdown__brand">
                <f:if condition="{data.brand_link.url}">
                    <f:then><f:link.typolink parameter="{data.brand_link}" class="navbar-dropdown__brand-link">{data.brand}</f:link.typolink></f:then>
                    <f:else><span class="navbar-dropdown__brand-link">{data.brand}</span></f:else>
                </f:if>
            </div>
            <ul class="navbar-dropdown__nav">
                <f:for each="{data.nav_items}" as="item">
                    <li class="navbar-dropdown__item">
                        <f:if condition="{item.link.url}">
                            <f:link.typolink parameter="{item.link}" class="navbar-dropdown__link">{item.label}</f:link.typolink>
                        </f:if>
                        <f:if condition="{item.children}">
                            <ul class="navbar-dropdown__submenu">
                                <f:for each="{item.children}" as="child">
                                    <li><f:if condition="{child.link.url}"><f:link.typolink parameter="{child.link}" class="navbar-dropdown__sublink">{child.label}</f:link.typolink></f:if></li>
                                </f:for>
                            </ul>
                        </f:if>
                    </li>
                </f:for>
            </ul>
            <f:if condition="{data.button_text} && {data.button_link.url}">
                <s2f:atom.button link="{data.button_link}" size="sm">{data.button_text}</s2f:atom.button>
            </f:if>
        </nav>
    </s2f:layout.container>
</s2f:layout.section>

</html>
