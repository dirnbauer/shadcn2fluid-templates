name: shadcn2fluid/navbar-dropdown
typeName: shadcn2fluid_navbardropdown
title: Dropdown Navbar
description: Navigation with dropdown sub-menus for top-level items
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand
    required: true
  - identifier: brand_link
    type: Link
    label: Brand Link
  - identifier: nav_items
    type: Collection
    label: Navigation Items
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link
      - identifier: children
        type: Textarea
        label: Sub-items (one per line)
        rows: 4
  - identifier: button_text
    type: Textarea
    rows: 1
    label: Button Text
  - identifier: button_link
    type: Link
    label: Button Link
