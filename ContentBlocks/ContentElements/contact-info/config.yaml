name: shadcn2fluid/contact-info
typeName: shadcn2fluid_contactinfo
title: Contact Info
description: Simple contact information cards with icons
group: conversion
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  - identifier: items
    type: Collection
    label: Contact Items
    minItems: 1
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:label_field'
        required: true
      - identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:value'
        required: true
      - identifier: link
        type: Link
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:link'
      - identifier: icon
        type: Textarea
        rows: 1
        label: Icon Label
