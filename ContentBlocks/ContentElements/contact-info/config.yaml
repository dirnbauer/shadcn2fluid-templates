name: shadcn2fluid/contact-info
typeName: shadcn2fluid_contactinfo
title: Contact Info
description: Simple contact information cards with icons
group: conversion
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: items
    type: Collection
    label: Contact Items
    minItems: 1
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
        required: true
      - identifier: value
        type: Textarea
        rows: 1
        label: Value
        required: true
      - identifier: link
        type: Link
        label: Link
      - identifier: icon
        type: Textarea
        rows: 1
        label: Icon Label
