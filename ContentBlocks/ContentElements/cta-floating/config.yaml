name: shadcn2fluid/cta-floating
typeName: shadcn2fluid_ctafloating
title: CTA Floating
description: Fixed-position floating call to action bar
group: conversion
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: cta_text
    type: Textarea
    rows: 1
    label: Button Text
  - identifier: cta_link
    type: Link
    label: Button Link
  - identifier: position
    type: Select
    renderType: selectSingle
    label: Position
    items:
      - label: Bottom
        value: bottom
      - label: Top
        value: top
    default: bottom
