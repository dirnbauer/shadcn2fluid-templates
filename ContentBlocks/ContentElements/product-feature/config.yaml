name: shadcn2fluid/product-feature
typeName: shadcn2fluid_productfeature
title: Product Feature
description: Product feature highlight with image and benefit list
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: description
    type: Textarea
    label: Description
    rows: 3

  - identifier: image
    type: File
    label: Product Image
    allowed: common-image-types
    maxitems: 1

  - identifier: features_list
    type: Textarea
    label: Feature Benefits (one per line)
    rows: 6

  - identifier: button_text
    type: Textarea
    rows: 1
    label: Button Text

  - identifier: button_link
    type: Link
    label: Button Link
