<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-team" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="team">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="team__intro">
                <f:if condition="{data.eyebrow}"><span class="team__eyebrow">{data.eyebrow}</span></f:if>
                <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
                <f:if condition="{data.subheadline}"><s2f:typography.text variant="muted">{data.subheadline}</s2f:typography.text></f:if>
            </header>
        </f:if>

        <div class="team__grid team__grid--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.members}" as="member">
                <s2f:molecule.card class="team__member">
                    <f:if condition="{member.image}">
                        <div class="team__image-wrapper">
                            <f:for each="{member.image}" as="fileReference">
                                <img src="{f:uri.image(image: fileReference, maxWidth: 640)}" alt="{member.name}" class="team__image"/>
                            </f:for>
                        </div>
                    </f:if>
                    <div class="team__content">
                        <h3 class="team__name">{member.name}</h3>
                        <p class="team__role">{member.role}</p>
                        <f:if condition="{member.bio}">
                            <p class="team__bio">{member.bio}</p>
                        </f:if>
                        <f:if condition="{member.profile_link.url}">
                            <div class="team__actions">
                                <s2f:atom.button link="{member.profile_link}" variant="ghost">View profile</s2f:atom.button>
                            </div>
                        </f:if>
                    </div>
                </s2f:molecule.card>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
