name: shadcn2fluid/hero-search
typeName: shadcn2fluid_herosearch
title: Hero Search
description: Hero with prominent search bar for platforms and directories
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3
  - identifier: form_action
    type: Link
    label: Search Action URL
  - identifier: placeholder
    type: Textarea
    rows: 1
    label: Search Placeholder
  - identifier: categories
    type: Collection
    label: Category Filters
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
      - identifier: link
        type: Link
        label: Link
