name: shadcn2fluid/client-list
typeName: shadcn2fluid_clientlist
title: Client List
description: Named list of clients with optional logos and industries
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2

  - identifier: clients
    type: Collection
    label: Clients
    minItems: 1
    fields:
      - identifier: name
        type: Textarea
        rows: 1
        label: Client Name
        required: true

      - identifier: industry
        type: Textarea
        rows: 1
        label: Industry

      - identifier: logo
        type: File
        label: Logo
        allowed: common-image-types
        maxitems: 1

      - identifier: link
        type: Link
        label: Website Link
