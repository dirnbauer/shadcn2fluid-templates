name: shadcn2fluid/product-reviews
typeName: shadcn2fluid_product-reviews
title: Product Reviews
description: Product review section with aggregate score and individual reviews
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: average_score
    type: Text
    label: Average Score
    description: e.g. 4.7

  - identifier: total_reviews
    type: Text
    label: Total Reviews
    description: e.g. 1,284 reviews

  - identifier: reviews
    type: Collection
    label: Reviews
    minItems: 1
    fields:
      - identifier: author
        type: Text
        label: Reviewer Name
        required: true

      - identifier: rating
        type: Select
        renderType: selectSingle
        label: Rating
        items:
          - label: 5 Stars
            value: '5'
          - label: 4 Stars
            value: '4'
          - label: 3 Stars
            value: '3'
        default: '5'

      - identifier: title
        type: Text
        label: Review Title

      - identifier: review_text
        type: Textarea
        label: Review Text
        rows: 3
        required: true

      - identifier: date
        type: Text
        label: Date
