name: shadcn2fluid/product-reviews
typeName: shadcn2fluid_productreviews
title: Product Reviews
description: Product review section with aggregate score and individual reviews
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: average_score
    type: Textarea
    rows: 1
    label: Average Score
    description: e.g. 4.7

  - identifier: total_reviews
    type: Textarea
    rows: 1
    label: Total Reviews
    description: e.g. 1,284 reviews

  - identifier: reviews
    type: Collection
    label: Reviews
    minItems: 1
    fields:
      - identifier: author
        type: Textarea
        rows: 1
        label: Reviewer Name
        required: true

      - identifier: rating
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:rating'
        items:
          - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.5_stars'
            value: '5'
          - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.4_stars'
            value: '4'
          - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.3_stars'
            value: '3'
        default: '5'

      - identifier: title
        type: Textarea
        rows: 1
        label: Review Title

      - identifier: review_text
        type: Textarea
        label: Review Text
        rows: 3
        required: true

      - identifier: date
        type: Textarea
        rows: 1
        label: Date
