<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-testimonial-featured" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="testimonial-featured">
    <f:if condition="{data.background_image}">
        <f:for each="{data.background_image}" as="bg">
            <div class="testimonial-featured__bg" style="background-image: url('{f:uri.image(image: bg, maxWidth: 1920)}')"></div>
        </f:for>
    </f:if>
    <s2f:layout.container>
        <div class="testimonial-featured__content">
            <f:if condition="{data.company_logo}">
                <div class="testimonial-featured__logo">
                    <f:for each="{data.company_logo}" as="logo">
                        <img src="{f:uri.image(image: logo, maxWidth: 180)}" alt="{data.author_company}" class="testimonial-featured__logo-img"/>
                    </f:for>
                </div>
            </f:if>

            <blockquote class="testimonial-featured__quote">&ldquo;{data.quote}&rdquo;</blockquote>

            <div class="testimonial-featured__author">
                <f:if condition="{data.author_image}">
                    <f:for each="{data.author_image}" as="fileReference">
                        <img src="{f:uri.image(image: fileReference, width: 64, height: 64)}" alt="{data.author_name}" class="testimonial-featured__avatar"/>
                    </f:for>
                </f:if>
                <div>
                    <cite class="testimonial-featured__name">{data.author_name}</cite>
                    <f:if condition="{data.author_title} || {data.author_company}">
                        <span class="testimonial-featured__role">
                            {data.author_title}<f:if condition="{data.author_title} && {data.author_company}">, </f:if>{data.author_company}
                        </span>
                    </f:if>
                </div>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
