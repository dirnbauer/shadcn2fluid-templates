name: shadcn2fluid/testimonial-featured
typeName: shadcn2fluid_testimonialfeatured
title: Testimonial Featured
description: Large hero-style featured testimonial with background
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: quote
    type: Textarea
    label: Quote Text
    rows: 4
    required: true

  - identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:author_name'
    required: true

  - identifier: author_title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:author_title'

  - identifier: author_company
    type: Textarea
    rows: 1
    label: Company

  - identifier: author_image
    type: File
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:author_photo'
    allowed: common-image-types
    maxitems: 1

  - identifier: company_logo
    type: File
    label: Company Logo
    allowed: common-image-types
    maxitems: 1

  - identifier: background_image
    type: File
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
