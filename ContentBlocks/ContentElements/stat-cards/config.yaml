name: shadcn2fluid/stat-cards
title: Stat Cards
description: Compact statistic cards with icon, value, and trend indicator
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Columns
    items:
      - label: 2 Columns
        value: '2'
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
    default: '4'
  - identifier: items
    type: Collection
    label: Stat Items
    minItems: 1
    fields:
      - identifier: label
        type: Text
        label: Label
        required: true
      - identifier: value
        type: Text
        label: Value
        required: true
      - identifier: change
        type: Text
        label: Change
        description: e.g. +12.5%
      - identifier: trend
        type: Select
        renderType: selectSingle
        label: Trend
        items:
          - label: Up
            value: up
          - label: Down
            value: down
          - label: Neutral
            value: neutral
        default: neutral
