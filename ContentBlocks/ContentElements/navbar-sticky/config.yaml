name: shadcn2fluid/navbar-sticky
typeName: shadcn2fluid_navbarsticky
title: Sticky Navbar
description: Sticky top navigation with brand, links, and CTA
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand
    required: true

  - identifier: nav_items
    type: Collection
    label: Navigation Items
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
      - identifier: link
        type: Link
        label: Link

  - identifier: button_text
    type: Textarea
    rows: 1
    label: Button Text

  - identifier: button_link
    type: Link
    label: Button Link
