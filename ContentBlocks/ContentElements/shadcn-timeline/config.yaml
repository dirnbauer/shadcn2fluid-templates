name: shadcn2fluid/timeline
title: ShadCN Timeline
description: Process, roadmap, and milestone timelines
group: common
prefixFields: false
fields:
  - identifier: section_layout
    type: Select
    renderType: selectSingle
    label: Template Layout
    items:
      - label: Full Width
        value: full-width
      - label: Two Columns
        value: two-columns
      - label: Stacked
        value: stacked
    default: stacked

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: headline
    type: Text
    label: Section Headline

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 2

  - identifier: items
    type: Collection
    label: Timeline Items
    minItems: 1
    fields:
      - identifier: step
        type: Text
        label: Step / Date
        required: true

      - identifier: title
        type: Text
        label: Title
        required: true

      - identifier: content
        type: Textarea
        label: Content
        rows: 4
        enableRichtext: true

      - identifier: link_text
        type: Text
        label: Link Text

      - identifier: link
        type: Link
        label: Link
