<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="shadcn-section shadcn-section--{data.section_layout -> f:or(alternative: 'stacked')} shadcn-timeline">
    <div class="shadcn-section__container">
        <f:if condition="{data.eyebrow} || {data.headline} || {data.subheadline}">
            <header class="shadcn-section__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="shadcn-section__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.headline}">
                    <h2 class="shadcn-section__headline">{data.headline}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-section__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="shadcn-section__body">
            <div class="shadcn-timeline__list">
                <f:for each="{data.items}" as="item" iteration="iteration">
                    <article class="shadcn-timeline__item">
                        <div class="shadcn-timeline__marker" aria-hidden="true">
                            <span class="shadcn-timeline__dot"></span>
                            <f:if condition="{iteration.isLast} == 0">
                                <span class="shadcn-timeline__line"></span>
                            </f:if>
                        </div>
                        <div class="shadcn-timeline__content shadcn-card">
                            <div class="shadcn-timeline__step">{item.step}</div>
                            <h3 class="shadcn-timeline__title">{item.title}</h3>
                            <f:if condition="{item.content}">
                                <div class="shadcn-timeline__text shadcn-prose">
                                    <f:format.html>{item.content}</f:format.html>
                                </div>
                            </f:if>
                            <f:if condition="{item.link.url} && {item.link_text}">
                                <div class="shadcn-timeline__actions">
                                    <f:render partial="Components/Button" arguments="{link: item.link, text: item.link_text, variant: 'ghost'}"/>
                                </div>
                            </f:if>
                        </div>
                    </article>
                </f:for>
            </div>
        </div>
    </div>
</section>

</html>
