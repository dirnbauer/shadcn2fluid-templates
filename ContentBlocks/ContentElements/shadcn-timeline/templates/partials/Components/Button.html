<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<!--
    ShadCN Button Component - Fluid Partial
    
    Arguments:
    - link: string - The URL for the button (required for anchor)
    - text: string - Button text content
    - variant: string - Button style variant (default, secondary, outline, ghost, destructive, link)
    - size: string - Button size (default, sm, lg, icon)
    - type: string - HTML element type (a, button) - defaults to 'a' if link provided
    - disabled: bool - Whether button is disabled
    - class: string - Additional CSS classes
    
    Usage:
    <f:render partial="Components/Button" arguments="{
        link: 'https://example.com',
        text: 'Click me',
        variant: 'default',
        size: 'default'
    }"/>
-->

<f:variable name="variantClass" value="{f:switch(expression: variant, cases: {
    'default': 'shadcn-btn--default',
    'secondary': 'shadcn-btn--secondary',
    'outline': 'shadcn-btn--outline',
    'ghost': 'shadcn-btn--ghost',
    'destructive': 'shadcn-btn--destructive',
    'link': 'shadcn-btn--link'
}, default: 'shadcn-btn--default')}"/>

<f:variable name="sizeClass" value="{f:switch(expression: size, cases: {
    'default': 'shadcn-btn--default-size',
    'sm': 'shadcn-btn--sm',
    'lg': 'shadcn-btn--lg',
    'icon': 'shadcn-btn--icon'
}, default: 'shadcn-btn--default-size')}"/>

<f:if condition="{link}">
    <f:then>
        <a href="{link}" 
           class="shadcn-btn {variantClass} {sizeClass} {class}"
           {f:if(condition: disabled, then: 'aria-disabled="true" tabindex="-1"')}>
            {text}
            <f:if condition="{children}">
                {children -> f:format.raw()}
            </f:if>
        </a>
    </f:then>
    <f:else>
        <button type="{type -> f:or(default: 'button')}"
                class="shadcn-btn {variantClass} {sizeClass} {class}"
                {f:if(condition: disabled, then: 'disabled')}>
            {text}
            <f:if condition="{children}">
                {children -> f:format.raw()}
            </f:if>
        </button>
    </f:else>
</f:if>

</html>
