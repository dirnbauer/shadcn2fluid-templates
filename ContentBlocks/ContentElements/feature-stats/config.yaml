name: shadcn2fluid/feature-stats
typeName: shadcn2fluid_featurestats
title: Feature Stats
description: Feature section with supporting statistics and key metrics
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: description
    type: Textarea
    label: Description
    rows: 3
  - identifier: items
    type: Collection
    label: Stats
    minItems: 1
    fields:
      - identifier: value
        type: Textarea
        rows: 1
        label: Stat Value
        required: true
      - identifier: label
        type: Textarea
        rows: 1
        label: Stat Label
        required: true
      - identifier: description_text
        type: Textarea
        rows: 1
        label: Supporting Text
