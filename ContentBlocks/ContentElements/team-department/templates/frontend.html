<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-team-department" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="team-department">
    <s2f:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="team-department__intro">
                <f:if condition="{data.header}"><s2f:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</s2f:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><s2f:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</s2f:atom.typography></f:if>
            </header>
        </f:if>

        <f:for each="{data.department_items}" as="dept">
            <div class="team-department__group">
                <h3 class="team-department__dept-name">{dept -> f:render.text(field: 'name')}</h3>
                <div class="team-department__grid">
                    <f:for each="{dept.members -> f:split(separator: '
')}" as="memberLine">
                        <f:if condition="{memberLine -> f:trim()}">
                            <f:variable name="memberParts" value="{memberLine -> f:split(separator: '|')}"/>
                            <s2f:molecule.card class="team-department__member">
                                <div class="team-department__content">
                                    <h4 class="team-department__name">{memberParts.0 -> f:trim()}</h4>
                                    <f:if condition="{memberParts.1}"><p class="team-department__role">{memberParts.1 -> f:trim()}</p></f:if>
                                </div>
                            </s2f:molecule.card>
                        </f:if>
                    </f:for>
                </div>
            </div>
        </f:for>
    </s2f:layout.container>
</s2f:layout.section>

</html>
