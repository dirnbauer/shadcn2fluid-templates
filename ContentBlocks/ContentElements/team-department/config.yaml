name: shadcn2fluid/team-department
typeName: shadcn2fluid_teamdepartment
title: Team Department
description: Team members grouped by department with section headings
group: team
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: department_items
    type: Collection
    label: Departments
    minItems: 1
    fields:
      - identifier: name
        type: Textarea
        rows: 1
        label: Department Name
        required: true
      - identifier: members
        type: Textarea
        label: "Members (one per line, format: Name | Role)"
        rows: 5
