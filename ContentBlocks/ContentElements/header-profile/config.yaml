name: shadcn2fluid/header-profile
typeName: shadcn2fluid_headerprofile
title: Profile Header
description: Profile page header with avatar, name, bio, and action buttons
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Name
  - identifier: role
    type: Textarea
    rows: 1
    label: Role / Title
  - identifier: bio
    type: Textarea
    label: Bio
    rows: 3
  - identifier: avatar
    type: File
    label: Avatar
    allowed: common-image-types
    maxitems: 1
  - identifier: primary_button_text
    type: Textarea
    rows: 1
    label: Primary Button Text
  - identifier: primary_button_link
    type: Link
    label: Primary Button Link
  - identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: Secondary Button Text
  - identifier: secondary_button_link
    type: Link
    label: Secondary Button Link
