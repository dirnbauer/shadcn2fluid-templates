name: shadcn2fluid/contact
typeName: shadcn2fluid_contact
title: Contact
description: Contact section with info cards and lead form layout
group: conversion
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3
  - identifier: info_title
    type: Textarea
    rows: 1
    label: Info Panel Title
  - identifier: info_text
    type: Textarea
    label: Info Panel Text
    rows: 3
  - identifier: contact_items
    type: Collection
    label: Contact Items
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
        required: true
      - identifier: value
        type: Textarea
        rows: 1
        label: Value
        required: true
      - identifier: link
        type: Link
        label: Optional Link
  - identifier: form_title
    type: Textarea
    rows: 1
    label: Form Title
    default: Send us a message
  - identifier: form_action
    type: Link
    label: Form Action URL
