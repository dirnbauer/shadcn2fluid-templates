name: shadcn2fluid/navbar-icon
typeName: shadcn2fluid_navbaricon
title: Icon Navbar
description: Navigation using icon buttons for compact visual navigation
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Text
    label: Brand
    required: true
  - identifier: brand_link
    type: Link
    label: Brand Link
  - identifier: nav_items
    type: Collection
    label: Navigation Items
    fields:
      - identifier: label
        type: Text
        label: Label
      - identifier: link
        type: Link
        label: Link
      - identifier: icon
        type: Text
        label: Icon Name
  - identifier: button_text
    type: Text
    label: Button Text
  - identifier: button_link
    type: Link
    label: Button Link
