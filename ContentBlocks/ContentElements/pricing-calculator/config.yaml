name: shadcn2fluid/pricing-calculator
typeName: shadcn2fluid_pricingcalculator
title: Pricing Calculator
description: Interactive pricing estimator with configurable tiers
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: description
    type: Textarea
    label: Description
    rows: 2

  - identifier: unit_label
    type: Textarea
    rows: 1
    label: Unit Label
    description: e.g. users, API calls, seats
    default: users

  - identifier: tiers
    type: Collection
    label: Pricing Tiers
    minItems: 1
    fields:
      - identifier: up_to
        type: Textarea
        rows: 1
        label: Up To (quantity)
        required: true

      - identifier: price_per_unit
        type: Textarea
        rows: 1
        label: Price Per Unit
        required: true

      - identifier: label
        type: Textarea
        rows: 1
        label: Tier Label
