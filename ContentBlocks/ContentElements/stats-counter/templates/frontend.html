<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-stats-counter" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="stats-counter">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="stats-counter__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="stats-counter__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="stats-counter__headline">{data.header}</h2>
                </f:if>
            </header>
        </f:if>

        <div class="stats-counter__grid stats-counter__grid--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.counters}" as="counter">
                <div class="stats-counter__item">
                    <span class="stats-counter__value" data-target="{counter.counter_target}">
                        {counter.counter_target}<f:if condition="{counter.suffix}">{counter.suffix}</f:if>
                    </span>
                    <h3 class="stats-counter__label">{counter.label}</h3>
                    <f:if condition="{counter.description}">
                        <p class="stats-counter__description">{counter.description}</p>
                    </f:if>
                </div>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
