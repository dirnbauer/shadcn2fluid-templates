<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-feature-checklist" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="feature-checklist">
    <s2f:layout.container>
        <header class="feature-checklist__intro">
            <f:if condition="{data.eyebrow}"><span class="feature-checklist__eyebrow">{data.eyebrow}</span></f:if>
            <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
        </header>
        <div class="feature-checklist__body">
            <s2f:molecule.card class="feature-checklist__list">
                <f:for each="{data.items}" as="item">
                    <div class="feature-checklist__item">
                        <span class="feature-checklist__marker" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                        </span>
                        <div>
                            <h3 class="feature-checklist__title">{item.title}</h3>
                            <f:if condition="{item.description}">
                                <p class="feature-checklist__description">{item.description}</p>
                            </f:if>
                        </div>
                    </div>
                </f:for>
            </s2f:molecule.card>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
