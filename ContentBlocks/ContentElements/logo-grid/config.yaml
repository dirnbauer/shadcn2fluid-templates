name: shadcn2fluid/logo-grid
title: Logo Grid
description: Structured grid of logos with optional captions
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Columns
    items:
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
      - label: 5 Columns
        value: '5'
    default: '4'

  - identifier: show_names
    type: Checkbox
    label: Show Company Names
    default: 0

  - identifier: logos
    type: Collection
    label: Logos
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Logo Image
        allowed: common-image-types
        maxitems: 1
        required: true

      - identifier: name
        type: Text
        label: Company Name
        required: true

      - identifier: link
        type: Link
        label: Optional Link
