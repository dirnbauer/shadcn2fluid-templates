name: shadcn2fluid/feature-minimal
typeName: shadcn2fluid_featureminimal
title: Feature Minimal
description: Ultra-clean feature list with title-only entries
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: items
    type: Collection
    label: Features
    minItems: 1
    fields:
      - identifier: title
        type: Text
        label: Title
        required: true
      - identifier: description_text
        type: Text
        label: Short Description
