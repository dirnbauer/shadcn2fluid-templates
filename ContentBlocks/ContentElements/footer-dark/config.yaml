name: shadcn2fluid/footer-dark
typeName: shadcn2fluid_footerdark
title: Footer Dark
description: Dark-themed footer with inverted colors
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Text
    label: Brand Name
  - identifier: description
    type: Textarea
    label: Description
    rows: 3
  - identifier: column_items
    type: Collection
    label: Link Groups
    fields:
      - identifier: title
        type: Text
        label: Group Title
      - identifier: link_items
        type: Collection
        label: Links
        fields:
          - identifier: label
            type: Text
            label: Label
          - identifier: link
            type: Link
            label: Link
  - identifier: copyright
    type: Text
    label: Copyright Text
