name: shadcn2fluid/footer-dark
typeName: shadcn2fluid_footerdark
title: Footer Dark
description: Dark-themed footer with inverted colors
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand Name
  - identifier: description
    type: Textarea
    label: Description
    rows: 3
  - identifier: column_items
    type: Collection
    label: Link Groups
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Group Title
      - identifier: links
        type: Textarea
        label: Links (one per line)
        rows: 5
  - identifier: copyright
    type: Textarea
    rows: 1
    label: Copyright Text
