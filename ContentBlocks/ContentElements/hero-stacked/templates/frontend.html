<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-stacked" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-stacked">
    <s2f:layout.container>
        <div class="hero-stacked__content">
            <f:if condition="{data.badge_text}"><s2f:atom.badge variant="secondary">{data -> f:render.text(field: 'badge_text')}</s2f:atom.badge></f:if>
            <f:if condition="{data.header}"><h1 class="hero-stacked__headline">{data -> f:render.text(field: 'header')}</h1></f:if>
            <f:if condition="{data.subheadline}"><p class="hero-stacked__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
            <div class="hero-stacked__actions">
                <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                    <s2f:atom.button link="{data.primary_button_link}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</s2f:atom.button>
                </f:if>
                <f:if condition="{data.secondary_button_text} && {data.secondary_button_link.url}">
                    <s2f:atom.button link="{data.secondary_button_link}" variant="outline" size="lg">{data -> f:render.text(field: 'secondary_button_text')}</s2f:atom.button>
                </f:if>
            </div>
        </div>
        <f:if condition="{data.hero_image}">
            <div class="hero-stacked__media">
                <f:for each="{data.hero_image}" as="image">
                    <f:image image="{image}" class="hero-stacked__image" alt="{data -> f:render.text(field: 'header')}"/>
                </f:for>
            </div>
        </f:if>
    </s2f:layout.container>
</s2f:layout.section>
</html>
