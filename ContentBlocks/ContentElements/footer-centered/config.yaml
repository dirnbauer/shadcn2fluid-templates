name: shadcn2fluid/footer-centered
typeName: shadcn2fluid_footercentered
title: Footer Centered
description: Centered footer with logo, links, and copyright
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:brand_name'
  - identifier: logo
    type: File
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:logo'
    allowed: common-image-types
    maxitems: 1
  - identifier: link_items
    type: Collection
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:links'
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:label_field'
        required: true
      - identifier: link
        type: Link
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:link'
  - identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:copyright_text'
