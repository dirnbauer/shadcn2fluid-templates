name: shadcn2fluid/footer-centered
typeName: shadcn2fluid_footercentered
title: Footer Centered
description: Centered footer with logo, links, and copyright
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand Name
  - identifier: logo
    type: File
    label: Logo
    allowed: common-image-types
    maxitems: 1
  - identifier: link_items
    type: Collection
    label: Links
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link
  - identifier: copyright
    type: Textarea
    rows: 1
    label: Copyright Text
