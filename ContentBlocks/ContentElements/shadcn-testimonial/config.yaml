name: shadcn2fluid/testimonial
title: ShadCN Testimonial
description: Customer testimonials and quotes with avatar
group: common
prefixFields: false
fields:
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Style
    items:
      - label: Simple Quote
        value: simple
      - label: Card Style
        value: card
      - label: Large Quote
        value: large
    default: simple

  - identifier: quote
    type: Textarea
    label: Quote Text
    rows: 4
    required: true

  - identifier: author_name
    type: Text
    label: Author Name
    required: true

  - identifier: author_title
    type: Text
    label: Author Title / Role

  - identifier: author_company
    type: Text
    label: Company Name

  - identifier: author_image
    type: File
    label: Author Photo
    allowed: common-image-types
    maxitems: 1

  - identifier: rating
    type: Select
    renderType: selectSingle
    label: Star Rating
    items:
      - label: No Rating
        value: '0'
      - label: 1 Star
        value: '1'
      - label: 2 Stars
        value: '2'
      - label: 3 Stars
        value: '3'
      - label: 4 Stars
        value: '4'
      - label: 5 Stars
        value: '5'
    default: '0'
