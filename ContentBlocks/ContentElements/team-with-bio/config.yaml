name: shadcn2fluid/team-with-bio
typeName: shadcn2fluid_teamwithbio
title: Team with Bio
description: Team members with extended biography text
group: team
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: members
    type: Collection
    label: Team Members
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Portrait
        allowed: common-image-types
        maxitems: 1
      - identifier: name
        type: Textarea
        rows: 1
        label: Name
        required: true
      - identifier: role
        type: Textarea
        rows: 1
        label: Role
      - identifier: bio
        type: Textarea
        label: Biography
        rows: 4
      - identifier: profile_link
        type: Link
        label: Profile Link
