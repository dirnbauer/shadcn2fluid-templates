<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-form" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-form">
    <s2f:layout.container>
        <div class="hero-form__content">
            <f:if condition="{data.badge_text}"><s2f:atom.badge variant="secondary">{data.badge_text}</s2f:atom.badge></f:if>
            <f:if condition="{data.header}"><h1 class="hero-form__headline">{data.header}</h1></f:if>
            <f:if condition="{data.subheadline}"><p class="hero-form__subheadline">{data.subheadline}</p></f:if>
            <form class="hero-form__form" action="{data.form_action.url}" method="post">
                <div class="hero-form__input-group">
                    <input type="email" name="email" placeholder="{data.input_placeholder -> f:or(alternative: 'Enter your email')}" class="hero-form__input" required="required"/>
                    <s2f:atom.button type="submit" size="lg">{data.button_text -> f:or(alternative: 'Get Started')}</s2f:atom.button>
                </div>
            </form>
            <f:if condition="{data.privacy_notice}">
                <p class="hero-form__privacy">{data.privacy_notice}</p>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
