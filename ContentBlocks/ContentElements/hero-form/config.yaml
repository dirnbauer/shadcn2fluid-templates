name: shadcn2fluid/hero-form
title: Hero Form
description: Hero section with inline signup or contact form
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3
  - identifier: form_action
    type: Link
    label: Form Action URL
  - identifier: input_placeholder
    type: Text
    label: Input Placeholder
  - identifier: button_text
    type: Text
    label: Button Text
  - identifier: privacy_text
    type: Text
    label: Privacy Text
  - identifier: badge_text
    type: Text
    label: Badge Text
