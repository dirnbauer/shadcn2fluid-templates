<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-blog-teasers" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="blog-teasers">
    <s2f:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="blog-teasers__intro">
                <f:if condition="{data.header}"><s2f:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</s2f:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><s2f:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</s2f:atom.typography></f:if>
            </header>
        </f:if>

        <div class="blog-teasers__grid blog-teasers__grid--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.posts}" as="post">
                <s2f:molecule.card class="blog-teasers__item">
                    <f:if condition="{post.image.0}">
                        <div class="blog-teasers__image-wrapper">
                            <f:image image="{post.image.0}" alt="{post -> f:render.text(field: 'title')}" maxWidth="960" class="blog-teasers__image"/>
                        </div>
                    </f:if>
                    <div class="blog-teasers__body">
                        <div class="blog-teasers__meta-row">
                            <f:if condition="{post.category}"><span class="blog-teasers__category">{post -> f:render.text(field: 'category')}</span></f:if>
                            <f:if condition="{post.meta}"><span class="blog-teasers__meta">{post -> f:render.text(field: 'meta')}</span></f:if>
                        </div>
                        <h3 class="blog-teasers__title">
                            <f:if condition="{post.link.url}">
                                <f:then><f:link.typolink parameter="{post.link}">{post -> f:render.text(field: 'title')}</f:link.typolink></f:then>
                                <f:else>{post -> f:render.text(field: 'title')}</f:else>
                            </f:if>
                        </h3>
                        <f:if condition="{post.excerpt}">
                            <p class="blog-teasers__excerpt">{post -> f:render.text(field: 'excerpt')}</p>
                        </f:if>
                    </div>
                </s2f:molecule.card>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
