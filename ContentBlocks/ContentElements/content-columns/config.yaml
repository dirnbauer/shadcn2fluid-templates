name: shadcn2fluid/content-columns
title: Content Columns
description: Multi-column rich text layout
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Columns
    items:
      - label: 2 Columns
        value: '2'
      - label: 3 Columns
        value: '3'
    default: '2'
  - identifier: items
    type: Collection
    label: Column Content
    minItems: 2
    fields:
      - identifier: content
        type: Textarea
        label: Content
        enableRichtext: true
        rows: 6
        required: true
