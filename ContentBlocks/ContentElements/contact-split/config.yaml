name: shadcn2fluid/contact-split
typeName: shadcn2fluid_contactsplit
title: Contact Split
description: Split layout with contact form and image side by side
group: conversion
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: description
    type: Textarea
    label: Description
    rows: 3
  - identifier: image
    type: File
    label: Side Image
    allowed: common-image-types
    maxitems: 1
  - identifier: form_action
    type: Link
    label: Form Action URL
  - identifier: submit_text
    type: Textarea
    rows: 1
    label: Submit Button Text
    default: Send message
