name: shadcn2fluid/product-grid
typeName: shadcn2fluid_productgrid
title: Product Grid
description: Grid of product cards with images and prices
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Columns
    items:
      - label: 2 Columns
        value: '2'
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
    default: '3'

  - identifier: products
    type: Collection
    label: Products
    minItems: 1
    fields:
      - identifier: name
        type: Textarea
        rows: 1
        label: Product Name
        required: true

      - identifier: image
        type: File
        label: Product Image
        allowed: common-image-types
        maxitems: 1

      - identifier: price
        type: Textarea
        rows: 1
        label: Price
        required: true

      - identifier: description_text
        type: Textarea
        rows: 1
        label: Short Description

      - identifier: link
        type: Link
        label: Product Link
