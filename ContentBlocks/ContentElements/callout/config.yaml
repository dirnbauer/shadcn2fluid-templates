name: shadcn2fluid/callout
typeName: shadcn2fluid_callout
title: Callout
description: Highlighted callout box for tips, warnings, or important notes
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: content
    type: Textarea
    label: Content
    enableRichtext: true
    rows: 4
    required: true
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Style
    items:
      - label: Info
        value: info
      - label: Warning
        value: warning
      - label: Success
        value: success
      - label: Danger
        value: danger
      - label: Note
        value: note
    default: info
