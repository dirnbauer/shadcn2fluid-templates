name: shadcn2fluid/logo-cloud
title: ShadCN Logo Cloud
description: Social proof logo grid for customers, partners, or press mentions
group: common
prefixFields: false
fields:
  - identifier: section_layout
    type: Select
    renderType: selectSingle
    label: Template Layout
    items:
      - label: Full Width
        value: full-width
      - label: Two Columns
        value: two-columns
      - label: Stacked
        value: stacked
    default: full-width

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: headline
    type: Text
    label: Section Headline

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 2

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Logo Columns
    items:
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
      - label: 5 Columns
        value: '5'
      - label: 6 Columns
        value: '6'
    default: '5'

  - identifier: logos
    type: Collection
    label: Logos
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Logo Image
        allowed: common-image-types
        maxitems: 1
        required: true

      - identifier: name
        type: Text
        label: Logo Name
        required: true

      - identifier: link
        type: Link
        label: Optional Link
