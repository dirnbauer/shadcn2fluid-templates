<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="shadcn-section shadcn-section--{data.section_layout -> f:or(alternative: 'full-width')} shadcn-logo-cloud">
    <div class="shadcn-section__container">
        <f:if condition="{data.eyebrow} || {data.headline} || {data.subheadline}">
            <header class="shadcn-section__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="shadcn-section__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.headline}">
                    <h2 class="shadcn-section__headline">{data.headline}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-section__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="shadcn-section__body">
            <div class="shadcn-logo-cloud__grid shadcn-logo-cloud__grid--cols-{data.columns -> f:or(alternative: '5')}">
                <f:for each="{data.logos}" as="logo">
                    <div class="shadcn-logo-cloud__item">
                        <f:if condition="{logo.link.url}">
                            <f:then>
                                <f:link.typolink parameter="{logo.link}" class="shadcn-logo-cloud__link" title="{logo.name}">
                                    <f:for each="{logo.image}" as="fileReference">
                                        <img src="{f:uri.image(image: fileReference, maxWidth: 220)}" alt="{logo.name}" class="shadcn-logo-cloud__image"/>
                                    </f:for>
                                </f:link.typolink>
                            </f:then>
                            <f:else>
                                <div class="shadcn-logo-cloud__link" title="{logo.name}">
                                    <f:for each="{logo.image}" as="fileReference">
                                        <img src="{f:uri.image(image: fileReference, maxWidth: 220)}" alt="{logo.name}" class="shadcn-logo-cloud__image"/>
                                    </f:for>
                                </div>
                            </f:else>
                        </f:if>
                    </div>
                </f:for>
            </div>
        </div>
    </div>
</section>

</html>
