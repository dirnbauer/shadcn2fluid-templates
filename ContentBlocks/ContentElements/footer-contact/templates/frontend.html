<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-footer-contact" href="{cb:assetPath()}/frontend.css"/>

<footer class="footer-contact">
    <s2f:layout.container>
        <div class="footer-contact__inner">
            <f:if condition="{data.header}">
                <h2 class="footer-contact__title">{data -> f:render.text(field: 'header')}</h2>
            </f:if>
            <div class="footer-contact__grid">
                <f:if condition="{data.address}">
                    <div class="footer-contact__item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                        <span class="footer-contact__text">{data -> f:render.text(field: 'address')}</span>
                    </div>
                </f:if>
                <f:if condition="{data.email}">
                    <div class="footer-contact__item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <a href="mailto:{data -> f:render.text(field: 'email')}" class="footer-contact__link">{data -> f:render.text(field: 'email')}</a>
                    </div>
                </f:if>
                <f:if condition="{data.phone}">
                    <div class="footer-contact__item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        <a href="tel:{data -> f:render.text(field: 'phone')}" class="footer-contact__link">{data -> f:render.text(field: 'phone')}</a>
                    </div>
                </f:if>
                <f:if condition="{data.hours}">
                    <div class="footer-contact__item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <span class="footer-contact__text">{data -> f:render.text(field: 'hours')}</span>
                    </div>
                </f:if>
            </div>
        </div>
        <f:if condition="{data.copyright}">
            <div class="footer-contact__bottom">
                <p class="footer-contact__copyright">{data -> f:render.text(field: 'copyright')}</p>
            </div>
        </f:if>
    </s2f:layout.container>
</footer>

</html>
