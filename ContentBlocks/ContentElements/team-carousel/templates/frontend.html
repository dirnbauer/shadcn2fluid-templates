<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-team-carousel" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="team-carousel">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="team-carousel__intro">
                <f:if condition="{data.eyebrow}"><span class="team-carousel__eyebrow">{data.eyebrow}</span></f:if>
                <f:if condition="{data.header}"><s2f:atom.typography tag="h2" variant="h2">{data.header}</s2f:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><s2f:atom.typography variant="muted">{data.subheadline}</s2f:atom.typography></f:if>
            </header>
        </f:if>

        <div class="team-carousel__track">
            <f:for each="{data.members}" as="member">
                <s2f:molecule.card class="team-carousel__slide">
                    <f:if condition="{member.image}">
                        <div class="team-carousel__image-wrapper">
                            <f:for each="{member.image}" as="fileReference">
                                <img src="{f:uri.image(image: fileReference, maxWidth: 400)}" alt="{member.name}" class="team-carousel__image"/>
                            </f:for>
                        </div>
                    </f:if>
                    <div class="team-carousel__content">
                        <h3 class="team-carousel__name">{member.name}</h3>
                        <f:if condition="{member.role}"><p class="team-carousel__role">{member.role}</p></f:if>
                        <f:if condition="{member.profile_link.url}">
                            <s2f:atom.button link="{member.profile_link}" variant="ghost" size="sm">View profile</s2f:atom.button>
                        </f:if>
                    </div>
                </s2f:molecule.card>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
