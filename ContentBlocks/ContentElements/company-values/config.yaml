name: shadcn2fluid/company-values
typeName: shadcn2fluid_companyvalues
title: Company Values
description: Core values presented as icon cards with descriptions
group: team
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:eyebrow'
  - identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  - identifier: value_items
    type: Collection
    label: Values
    minItems: 1
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Value Title
        required: true
      - identifier: description
        type: Textarea
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
        rows: 2
      - identifier: icon
        type: Textarea
        rows: 1
        label: Icon Label
