<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-company-values" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="company-values">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="company-values__intro">
                <f:if condition="{data.eyebrow}"><span class="company-values__eyebrow">{data.eyebrow}</span></f:if>
                <f:if condition="{data.header}"><s2f:atom.typography tag="h2" variant="h2">{data.header}</s2f:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><s2f:atom.typography variant="muted">{data.subheadline}</s2f:atom.typography></f:if>
            </header>
        </f:if>

        <div class="company-values__grid">
            <f:for each="{data.value_items}" as="value">
                <s2f:molecule.card class="company-values__item">
                    <f:if condition="{value.icon}"><span class="company-values__icon">{value.icon}</span></f:if>
                    <h3 class="company-values__title">{value.title}</h3>
                    <f:if condition="{value.description}"><p class="company-values__description">{value.description}</p></f:if>
                </s2f:molecule.card>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
