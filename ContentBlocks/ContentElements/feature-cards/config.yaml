name: shadcn2fluid/feature-cards
typeName: shadcn2fluid_featurecards
title: Feature Cards
description: Card-based feature presentation with title and supporting copy
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: items
    type: Collection
    label: Feature Cards
    minItems: 1
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
      - identifier: description
        type: Textarea
        label: Description
        rows: 2
