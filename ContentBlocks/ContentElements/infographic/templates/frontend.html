<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-infographic" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="infographic">
    <s2f:layout.container>
        <f:if condition="{data.header} || {data.description}">
            <header class="infographic__intro">
                <f:if condition="{data.header}">
                    <h2 class="infographic__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="infographic__description">{data -> f:render.text(field: 'description')}</p>
                </f:if>
            </header>
        </f:if>

        <div class="infographic__steps infographic__steps--{data.layout -> f:or(alternative: 'horizontal')}">
            <f:for each="{data.items}" as="item" iteration="iter">
                <div class="infographic__step">
                    <div class="infographic__number">{item.number -> f:or(alternative: iter.cycle)}</div>
                    <f:if condition="{item.image}">
                        <div class="infographic__icon">
                            <f:for each="{item.image}" as="file">
                                <f:image image="{file}" alt="{item -> f:render.text(field: 'title')}" width="64"/>
                            </f:for>
                        </div>
                    </f:if>
                    <h3 class="infographic__step-title">{item -> f:render.text(field: 'title')}</h3>
                    <f:if condition="{item.description}">
                        <p class="infographic__step-description">{item -> f:render.text(field: 'description')}</p>
                    </f:if>
                </div>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
