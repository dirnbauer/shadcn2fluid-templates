name: shadcn2fluid/legal-disclaimer
title: Legal Disclaimer
description: Legal disclaimer block with structured content
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: content
    type: Textarea
    label: Disclaimer Text
    enableRichtext: true
    rows: 6
    required: true
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Style
    items:
      - label: Default
        value: default
      - label: Boxed
        value: boxed
      - label: Bordered
        value: bordered
    default: default
