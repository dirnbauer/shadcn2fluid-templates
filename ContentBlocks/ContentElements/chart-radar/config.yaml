name: shadcn2fluid/chart-radar
typeName: shadcn2fluid_chartradar
title: Chart Radar
description: Radar (spider) chart for comparing metrics on multiple axes
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: description
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
    rows: 2
  - identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:chart_data_json'
    description: |
      JSON object: {"labels":["Speed","Reliability","Support","UX","Price"],"values":[4,5,3,4,5]} (values 0–5 scale)
    rows: 6
    required: true
  - identifier: fill_opacity
    type: Select
    renderType: selectSingle
    label: Fill opacity
    items:
      - label: Light
        value: '0.15'
      - label: Medium
        value: '0.25'
      - label: Strong
        value: '0.4'
    default: '0.25'
