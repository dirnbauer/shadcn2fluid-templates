name: shadcn2fluid/utility-bar
title: Utility Bar
description: Compact utility navigation with support links and contact text
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: left_text
    type: Text
    label: Left Text

  - identifier: link_items
    type: Collection
    label: Links
    fields:
      - identifier: label
        type: Text
        label: Label
      - identifier: link
        type: Link
        label: Link
