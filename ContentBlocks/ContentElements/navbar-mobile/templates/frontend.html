<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-navbar-mobile" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="navbar-mobile">
    <s2f:layout.container>
        <nav class="navbar-mobile__inner" aria-label="Mobile navigation">
            <div class="navbar-mobile__brand">
                <f:if condition="{data.brand_link.url}">
                    <f:then><f:link.typolink parameter="{data.brand_link}" class="navbar-mobile__brand-link">{data.brand}</f:link.typolink></f:then>
                    <f:else><span class="navbar-mobile__brand-link">{data.brand}</span></f:else>
                </f:if>
            </div>
            <button class="navbar-mobile__toggle" aria-expanded="false" aria-controls="navbar-mobile-menu" type="button">
                <span class="navbar-mobile__toggle-bar"></span>
                <span class="navbar-mobile__toggle-bar"></span>
                <span class="navbar-mobile__toggle-bar"></span>
            </button>
            <div class="navbar-mobile__menu" id="navbar-mobile-menu">
                <ul class="navbar-mobile__nav">
                    <f:for each="{data.nav_items}" as="item">
                        <li>
                            <f:if condition="{item.link.url}">
                                <f:link.typolink parameter="{item.link}" class="navbar-mobile__link">{item.label}</f:link.typolink>
                            </f:if>
                        </li>
                    </f:for>
                </ul>
                <f:if condition="{data.button_text} && {data.button_link.url}">
                    <s2f:atom.button link="{data.button_link}" class="navbar-mobile__cta">{data.button_text}</s2f:atom.button>
                </f:if>
            </div>
        </nav>
    </s2f:layout.container>
</s2f:layout.section>

</html>
