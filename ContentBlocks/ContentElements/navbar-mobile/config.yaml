name: shadcn2fluid/navbar-mobile
typeName: shadcn2fluid_navbarmobile
title: Mobile Navbar
description: Mobile-optimized navigation with hamburger menu toggle
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand
    required: true
  - identifier: brand_link
    type: Link
    label: Brand Link
  - identifier: nav_items
    type: Collection
    label: Navigation Items
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link
  - identifier: button_text
    type: Textarea
    rows: 1
    label: Button Text
  - identifier: button_link
    type: Link
    label: Button Link
