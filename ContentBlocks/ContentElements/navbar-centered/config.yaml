name: shadcn2fluid/navbar-centered
title: Centered Navbar
description: Centered marketing navigation with balanced links and CTA
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: brand
    type: Text
    label: Brand
    required: true

  - identifier: nav_items
    type: Collection
    label: Navigation Items
    fields:
      - identifier: label
        type: Text
        label: Label
      - identifier: link
        type: Link
        label: Link

  - identifier: button_text
    type: Text
    label: Button Text

  - identifier: button_link
    type: Link
    label: Button Link
