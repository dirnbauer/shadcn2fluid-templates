name: shadcn2fluid/job-card
typeName: shadcn2fluid_jobcard
title: Job Card
description: Single featured job posting with details and apply button
group: team
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Job Title
  - identifier: department
    type: Textarea
    rows: 1
    label: Department
  - identifier: location
    type: Textarea
    rows: 1
    label: Location
  - identifier: type
    type: Text
    label: Employment Type
  - identifier: description
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
    rows: 4
  - identifier: apply_link
    type: Link
    label: Apply Link
