name: shadcn2fluid/footer-split
typeName: shadcn2fluid_footersplit
title: Footer Split
description: Two-column split footer with brand left and links right
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Text
    label: Brand Name
  - identifier: description
    type: Textarea
    label: Description
    rows: 3
  - identifier: link_items
    type: Collection
    label: Links
    fields:
      - identifier: label
        type: Text
        label: Label
        required: true
      - identifier: link
        type: Link
        label: Link
  - identifier: copyright
    type: Text
    label: Copyright Text
