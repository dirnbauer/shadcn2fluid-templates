name: shadcn2fluid/case-study-featured
typeName: shadcn2fluid_casestudyfeatured
title: Case Study Featured
description: Large featured case study with full-width layout and metrics
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:eyebrow'

  - identifier: client_name
    type: Textarea
    rows: 1
    label: Client Name
    required: true

  - identifier: client_logo
    type: File
    label: Client Logo
    allowed: common-image-types
    maxitems: 1

  - identifier: description
    type: Textarea
    label: Case Study Description
    rows: 4
    required: true

  - identifier: image
    type: File
    label: Hero Image
    allowed: common-image-types
    maxitems: 1

  - identifier: metrics
    type: Collection
    label: Key Metrics
    minItems: 1
    maxItems: 4
    fields:
      - identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:value'
        required: true

      - identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:label_field'
        required: true

  - identifier: link
    type: Link
    label: Read Full Case Study
