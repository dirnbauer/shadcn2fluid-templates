<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="shadcn-section shadcn-section--{data.section_layout -> f:or(alternative: 'stacked')} shadcn-team">
    <div class="shadcn-section__container">
        <f:if condition="{data.eyebrow} || {data.headline} || {data.subheadline}">
            <header class="shadcn-section__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="shadcn-section__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.headline}">
                    <h2 class="shadcn-section__headline">{data.headline}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-section__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="shadcn-section__body">
            <div class="shadcn-team__grid shadcn-team__grid--cols-{data.columns -> f:or(alternative: '3')}">
                <f:for each="{data.members}" as="member">
                    <article class="shadcn-team__member shadcn-card">
                        <f:if condition="{member.image}">
                            <div class="shadcn-team__image-wrapper">
                                <f:for each="{member.image}" as="fileReference">
                                    <img src="{f:uri.image(image: fileReference, maxWidth: 640)}" alt="{member.name}" class="shadcn-team__image"/>
                                </f:for>
                            </div>
                        </f:if>

                        <div class="shadcn-card__content shadcn-team__content">
                            <h3 class="shadcn-team__name">{member.name}</h3>
                            <p class="shadcn-team__role">{member.role}</p>
                            <f:if condition="{member.bio}">
                                <p class="shadcn-team__bio">{member.bio}</p>
                            </f:if>
                            <f:if condition="{member.profile_link.url}">
                                <div class="shadcn-team__actions">
                                    <f:render partial="Components/Button" arguments="{link: member.profile_link, text: 'View profile', variant: 'ghost'}"/>
                                </div>
                            </f:if>
                        </div>
                    </article>
                </f:for>
            </div>
        </div>
    </div>
</section>

</html>
