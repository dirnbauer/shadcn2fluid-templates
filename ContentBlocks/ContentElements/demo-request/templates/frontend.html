<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-demo-request" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="demo-request">
    <s2f:layout.container>
        <div class="demo-request__layout">
            <div class="demo-request__content">
                <f:if condition="{data.eyebrow}"><span class="demo-request__eyebrow">{data.eyebrow}</span></f:if>
                <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
                <f:if condition="{data.description}"><s2f:typography.text variant="muted">{data.description}</s2f:typography.text></f:if>
                <f:if condition="{data.image}">
                    <f:for each="{data.image}" as="fileReference">
                        <img src="{f:uri.image(image: fileReference, maxWidth: 480)}" alt="" class="demo-request__image"/>
                    </f:for>
                </f:if>
            </div>
            <s2f:molecule.card class="demo-request__form-card">
                <form class="demo-request__form" action="{data.form_action.url}" method="post">
                    <label class="demo-request__field">
                        <span class="demo-request__label">Name</span>
                        <input class="demo-request__input" type="text" name="name" required="required"/>
                    </label>
                    <label class="demo-request__field">
                        <span class="demo-request__label">Work Email</span>
                        <input class="demo-request__input" type="email" name="email" required="required"/>
                    </label>
                    <label class="demo-request__field">
                        <span class="demo-request__label">Company</span>
                        <input class="demo-request__input" type="text" name="company"/>
                    </label>
                    <label class="demo-request__field">
                        <span class="demo-request__label">Message</span>
                        <textarea class="demo-request__textarea" name="message" rows="3"></textarea>
                    </label>
                    <s2f:atom.button type="submit" size="lg">{data.submit_text -> f:or(alternative: 'Request demo')}</s2f:atom.button>
                </form>
            </s2f:molecule.card>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
