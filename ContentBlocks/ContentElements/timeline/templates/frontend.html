<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-timeline" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="timeline">
    <s2f:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="timeline__intro">
                <f:if condition="{data.header}"><s2f:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</s2f:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><s2f:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</s2f:atom.typography></f:if>
            </header>
        </f:if>

        <div class="timeline__list">
            <f:for each="{data.items}" as="item" iteration="iteration">
                <article class="timeline__item">
                    <div class="timeline__marker" aria-hidden="true">
                        <span class="timeline__dot"></span>
                        <f:if condition="{iteration.isLast} == 0">
                            <span class="timeline__line"></span>
                        </f:if>
                    </div>
                    <s2f:molecule.card class="timeline__content">
                        <div class="timeline__step">{item -> f:render.text(field: 'step')}</div>
                        <h3 class="timeline__title">{item -> f:render.text(field: 'title')}</h3>
                        <f:if condition="{item.content}">
                            <div class="timeline__text">
                                {item -> f:render.text(field: 'content')}
                            </div>
                        </f:if>
                        <f:if condition="{item.link.url} && {item.link_text}">
                            <div class="timeline__actions">
                                <f:link.typolink parameter="{item.link}" class="timeline__link">{item -> f:render.text(field: 'link_text')}</f:link.typolink>
                            </div>
                        </f:if>
                    </s2f:molecule.card>
                </article>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
