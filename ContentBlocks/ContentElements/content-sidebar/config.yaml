name: shadcn2fluid/content-sidebar
typeName: shadcn2fluid_content-sidebar
title: Content with Sidebar
description: Main content area with a complementary sidebar
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: content
    type: Textarea
    label: Main Content
    enableRichtext: true
    rows: 8
  - identifier: sidebar_content
    type: Textarea
    label: Sidebar Content
    enableRichtext: true
    rows: 6
  - identifier: sidebar_position
    type: Select
    renderType: selectSingle
    label: Sidebar Position
    items:
      - label: Right
        value: right
      - label: Left
        value: left
    default: right
