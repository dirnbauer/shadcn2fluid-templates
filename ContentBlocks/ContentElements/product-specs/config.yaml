name: shadcn2fluid/product-specs
typeName: shadcn2fluid_productspecs
title: Product Specs
description: Technical specifications table for products
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:eyebrow'

  - identifier: description
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
    rows: 2

  - identifier: specs
    type: Collection
    label: Specifications
    minItems: 1
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Spec Label
        required: true

      - identifier: value
        type: Textarea
        rows: 1
        label: Spec Value
        required: true

  - identifier: image
    type: File
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:product_image'
    allowed: common-image-types
    maxitems: 1
