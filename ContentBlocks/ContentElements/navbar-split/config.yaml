name: shadcn2fluid/navbar-split
typeName: shadcn2fluid_navbarsplit
title: Split Navbar
description: Split navigation with left links, brand center, right actions
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: brand
    type: Textarea
    rows: 1
    label: Brand
    required: true
  - identifier: brand_link
    type: Link
    label: Brand Link
  - identifier: left_items
    type: Collection
    label: Left Links
    fields:
      - identifier: label
        type: Textarea
        rows: 1area
        rows: 1
        label: Label
      - identifier: link
        type: Link
        label: Link
  - identifier: right_items
    type: Collection
    label: Right Links
    fields:
      - identifier: label
        type: Text
        label: Label
      - identifier: link
        type: Link
        label: Link
  - identifier: button_text
    type: Textarea
    rows: 1
    label: Button Text
  - identifier: button_link
    type: Link
    label: Button Link
