name: shadcn2fluid/gdpr-banner
typeName: shadcn2fluid_gdprbanner
title: GDPR Banner
description: GDPR-compliant consent banner with granular cookie controls
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: content
    type: Textarea
    label: Banner Message
    enableRichtext: true
    rows: 3
    required: true
  - identifier: categories
    type: Collection
    label: Cookie Categories
    fields:
      - identifier: name
        type: Textarea
        rows: 1
        label: Category Name
        required: true
      - identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:description'
      - identifier: required
        type: Checkbox
        label: Required (cannot be disabled)
        default: 0
  - identifier: accept_text
    type: Textarea
    rows: 1
    label: Accept All Text
    default: Accept All
  - identifier: save_text
    type: Textarea
    rows: 1
    label: Save Preferences Text
    default: Save Preferences
  - identifier: privacy_link
    type: Link
    label: Privacy Policy Link
