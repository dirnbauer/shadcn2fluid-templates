name: shadcn2fluid/gdpr-banner
title: GDPR Banner
description: GDPR-compliant consent banner with granular cookie controls
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: content
    type: Textarea
    label: Banner Message
    enableRichtext: true
    rows: 3
    required: true
  - identifier: categories
    type: Collection
    label: Cookie Categories
    fields:
      - identifier: name
        type: Text
        label: Category Name
        required: true
      - identifier: description
        type: Textarea
        label: Description
      - identifier: required
        type: Checkbox
        label: Required (cannot be disabled)
        default: 0
  - identifier: accept_text
    type: Text
    label: Accept All Text
    default: Accept All
  - identifier: save_text
    type: Text
    label: Save Preferences Text
    default: Save Preferences
  - identifier: privacy_link
    type: Link
    label: Privacy Policy Link
