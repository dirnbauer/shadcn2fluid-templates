<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-case-study-grid" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="case-study-grid">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="case-study-grid__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="case-study-grid__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="case-study-grid__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <div class="case-study-grid__items case-study-grid__items--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.cases}" as="item">
                <article class="case-study-grid__card">
                    <f:if condition="{item.image}">
                        <div class="case-study-grid__media">
                            <f:for each="{item.image}" as="fileReference">
                                <img src="{f:uri.image(image: fileReference, maxWidth: 480)}" alt="{item -> f:render.text(field: 'client_name')}" class="case-study-grid__image"/>
                            </f:for>
                        </div>
                    </f:if>
                    <div class="case-study-grid__body">
                        <h3 class="case-study-grid__client">{item -> f:render.text(field: 'client_name')}</h3>
                        <f:if condition="{item.summary}">
                            <p class="case-study-grid__summary">{item -> f:render.text(field: 'summary')}</p>
                        </f:if>
                        <f:if condition="{item.result}">
                            <span class="case-study-grid__result">{item -> f:render.text(field: 'result')}</span>
                        </f:if>
                        <f:if condition="{item.link.url}">
                            <f:link.typolink parameter="{item.link}" class="case-study-grid__link">
                                Read more &rarr;
                            </f:link.typolink>
                        </f:if>
                    </div>
                </article>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
