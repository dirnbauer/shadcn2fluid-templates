name: shadcn2fluid/accessibility-statement
typeName: shadcn2fluid_accessibilitystatement
title: Accessibility Statement
description: Accessibility commitment page with conformance details
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: conformance_level
    type: Select
    renderType: selectSingle
    label: Conformance Level
    items:
      - label: WCAG 2.1 Level A
        value: a
      - label: WCAG 2.1 Level AA
        value: aa
      - label: WCAG 2.1 Level AAA
        value: aaa
    default: aa
  - identifier: content
    type: Textarea
    label: Statement Content
    enableRichtext: true
    rows: 8
    required: true
  - identifier: contact_email
    type: Text
    label: Contact Email
  - identifier: last_updated
    type: Textarea
    rows: 1
    label: Last Updated
