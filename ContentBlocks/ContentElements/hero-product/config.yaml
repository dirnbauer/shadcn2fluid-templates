name: shadcn2fluid/hero-product
typeName: shadcn2fluid_heroproduct
title: Hero Product
description: Product-focused hero with feature image and pricing CTA
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Product Name
  - identifier: subheadline
    type: Textarea
    label: Description
    rows: 3
  - identifier: badge_text
    type: Textarea
    rows: 1
    label: Badge Text
  - identifier: price
    type: Textarea
    rows: 1
    label: Price
  - identifier: product_image
    type: File
    label: Product Image
    allowed: common-image-types
    maxitems: 1
  - identifier: primary_button_text
    type: Textarea
    rows: 1
    label: Primary Button Text
  - identifier: primary_button_link
    type: Link
    label: Primary Button Link
  - identifier: feature_items
    type: Collection
    label: Key Features
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: Feature
