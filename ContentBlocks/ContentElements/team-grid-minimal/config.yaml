name: shadcn2fluid/team-grid-minimal
typeName: shadcn2fluid_teamgridminimal
title: Team Grid Minimal
description: Minimal team grid with name and role only
group: team
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Columns
    items:
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
      - label: 5 Columns
        value: '5'
    default: '4'
  - identifier: members
    type: Collection
    label: Members
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Portrait
        allowed: common-image-types
        maxitems: 1
      - identifier: name
        type: Text
        label: Name
        required: true
      - identifier: role
        type: Text
        label: Role
