<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-emergency-contact" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="emergency-contact">
    <s2f:layout.container>
        <div class="emergency-contact__card">
            <f:if condition="{data.header}"><h2 class="emergency-contact__headline">{data.header}</h2></f:if>
            <f:if condition="{data.description_text}"><p class="emergency-contact__description">{data.description_text}</p></f:if>
            <f:if condition="{data.phone}">
                <div class="emergency-contact__phone">
                    <f:if condition="{data.phone_link.url}">
                        <f:then>
                            <f:link.typolink parameter="{data.phone_link}" class="emergency-contact__number">{data.phone}</f:link.typolink>
                        </f:then>
                        <f:else>
                            <span class="emergency-contact__number">{data.phone}</span>
                        </f:else>
                    </f:if>
                </div>
            </f:if>
            <f:if condition="{data.available}"><p class="emergency-contact__available">{data.available}</p></f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
