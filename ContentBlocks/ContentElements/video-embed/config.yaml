name: shadcn2fluid/video-embed
typeName: shadcn2fluid_videoembed
title: Video Embed
description: Responsive video embed for YouTube, Vimeo, or self-hosted video
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: video_url
    type: Text
    label: Video Embed URL
    description: YouTube or Vimeo embed URL
  - identifier: video_file
    type: File
    label: Video File
    allowed: common-media-types
    maxitems: 1
  - identifier: caption
    type: Text
    label: Caption
  - identifier: aspect_ratio
    type: Select
    renderType: selectSingle
    label: Aspect Ratio
    items:
      - label: 16:9
        value: '16-9'
      - label: 4:3
        value: '4-3'
      - label: 1:1
        value: '1-1'
    default: '16-9'
