name: shadcn2fluid/gallery
title: ShadCN Gallery / Portfolio
description: Visual gallery or portfolio grid with optional links
group: common
prefixFields: false
fields:
  - identifier: section_layout
    type: Select
    renderType: selectSingle
    label: Template Layout
    items:
      - label: Full Width
        value: full-width
      - label: Two Columns
        value: two-columns
      - label: Stacked
        value: stacked
    default: full-width

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: headline
    type: Text
    label: Section Headline

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 2

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Gallery Columns
    items:
      - label: 2 Columns
        value: '2'
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
    default: '3'

  - identifier: items
    type: Collection
    label: Gallery Items
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Image
        allowed: common-image-types
        maxitems: 1
        required: true

      - identifier: title
        type: Text
        label: Title

      - identifier: description
        type: Textarea
        label: Description
        rows: 2

      - identifier: link
        type: Link
        label: Optional Link
