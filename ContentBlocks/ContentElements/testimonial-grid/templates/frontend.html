<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-testimonial-grid" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="testimonial-grid">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="testimonial-grid__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="testimonial-grid__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="testimonial-grid__headline">{data.header}</h2>
                </f:if>
            </header>
        </f:if>

        <div class="testimonial-grid__items testimonial-grid__items--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.testimonials}" as="item">
                <article class="testimonial-grid__card">
                    <blockquote class="testimonial-grid__quote">{item.quote}</blockquote>
                    <div class="testimonial-grid__author">
                        <f:if condition="{item.author_image}">
                            <f:for each="{item.author_image}" as="fileReference">
                                <img src="{f:uri.image(image: fileReference, width: 48, height: 48)}" alt="{item.author_name}" class="testimonial-grid__avatar"/>
                            </f:for>
                        </f:if>
                        <div>
                            <cite class="testimonial-grid__name">{item.author_name}</cite>
                            <f:if condition="{item.author_title}">
                                <span class="testimonial-grid__role">{item.author_title}</span>
                            </f:if>
                        </div>
                    </div>
                </article>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
