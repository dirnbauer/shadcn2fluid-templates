name: shadcn2fluid/privacy-notice
typeName: shadcn2fluid_privacynotice
title: Privacy Notice
description: Compact privacy policy summary with expandable sections
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: intro
    type: Textarea
    label: Introduction
    rows: 3
  - identifier: sections
    type: Collection
    label: Sections
    minItems: 1
    fields:
      - identifier: title
        type: Text
        label: Section Title
        required: true
      - identifier: content
        type: Textarea
        label: Content
        enableRichtext: true
        rows: 4
  - identifier: last_updated
    type: Text
    label: Last Updated Date
