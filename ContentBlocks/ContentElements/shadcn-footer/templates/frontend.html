<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<footer class="shadcn-footer shadcn-footer--{data.layout -> f:or(alternative: 'two-columns')}">
    <div class="shadcn-footer__container">
        <div class="shadcn-footer__brand">
            <h2 class="shadcn-footer__title">{data.brand}</h2>
            <f:if condition="{data.description}">
                <p class="shadcn-footer__description">{data.description}</p>
            </f:if>
            <f:if condition="{data.copyright}">
                <p class="shadcn-footer__copyright">{data.copyright}</p>
            </f:if>
        </div>

        <f:if condition="{data.footer_links}">
            <nav class="shadcn-footer__nav" aria-label="Footer navigation">
                <ul class="shadcn-footer__links">
                    <f:for each="{data.footer_links}" as="item">
                        <li>
                            <f:link.typolink parameter="{item.link}" class="shadcn-footer__link">{item.label}</f:link.typolink>
                        </li>
                    </f:for>
                </ul>
            </nav>
        </f:if>

        <f:if condition="{data.utility_links}">
            <nav class="shadcn-footer__utilities" aria-label="Footer utilities">
                <ul class="shadcn-footer__links">
                    <f:for each="{data.utility_links}" as="item">
                        <li>
                            <f:link.typolink parameter="{item.link}" class="shadcn-footer__link">{item.label}</f:link.typolink>
                        </li>
                    </f:for>
                </ul>
            </nav>
        </f:if>
    </div>
</footer>

</html>
