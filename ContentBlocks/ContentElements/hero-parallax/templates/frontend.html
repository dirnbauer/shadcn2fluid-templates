<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-parallax" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-parallax">
    <f:if condition="{data.background_image}">
        <div class="hero-parallax__bg-wrap">
            <f:for each="{data.background_image}" as="image">
                <f:image image="{image}" class="hero-parallax__bg" alt=""/>
            </f:for>
        </div>
    </f:if>
    <div class="hero-parallax__overlay"></div>
    <s2f:layout.container>
        <div class="hero-parallax__content">
            <f:if condition="{data.badge_text}"><s2f:atom.badge variant="secondary">{data -> f:render.text(field: 'badge_text')}</s2f:atom.badge></f:if>
            <f:if condition="{data.header}"><h1 class="hero-parallax__headline">{data -> f:render.text(field: 'header')}</h1></f:if>
            <f:if condition="{data.subheadline}"><p class="hero-parallax__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
            <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                <s2f:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</s2f:atom.button>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
