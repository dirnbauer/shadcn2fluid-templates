<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-feature-highlight" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="feature-highlight feature-highlight--{data.variant -> f:or(alternative: 'muted')}">
    <s2f:layout.container>
        <div class="feature-highlight__grid">
            <div class="feature-highlight__copy">
                <f:if condition="{data.eyebrow}"><span class="feature-highlight__eyebrow">{data.eyebrow}</span></f:if>
                <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
                <f:if condition="{data.description}">
                    <s2f:typography.text class="feature-highlight__description">{data.description}</s2f:typography.text>
                </f:if>
                <f:if condition="{data.link.url} && {data.link_text}">
                    <div class="feature-highlight__actions">
                        <f:link.typolink parameter="{data.link}" class="feature-highlight__cta">{data.link_text}</f:link.typolink>
                    </div>
                </f:if>
            </div>
            <f:if condition="{data.image.0}">
                <div class="feature-highlight__media">
                    <f:image image="{data.image.0}" alt="{data.header}" maxWidth="640" class="feature-highlight__image"/>
                </div>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
