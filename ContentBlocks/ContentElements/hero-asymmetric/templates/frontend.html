<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-asymmetric" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-asymmetric">
    <s2f:layout.container>
        <div class="hero-asymmetric__grid">
            <div class="hero-asymmetric__content">
                <f:if condition="{data.badge_text}"><s2f:atom.badge variant="secondary">{data -> f:render.text(field: 'badge_text')}</s2f:atom.badge></f:if>
                <f:if condition="{data.header}"><h1 class="hero-asymmetric__headline">{data -> f:render.text(field: 'header')}</h1></f:if>
                <f:if condition="{data.subheadline}"><p class="hero-asymmetric__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
                <div class="hero-asymmetric__actions">
                    <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                        <s2f:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</s2f:atom.button>
                    </f:if>
                    <f:if condition="{data.secondary_button_text} && {data.secondary_button_link.url}">
                        <s2f:atom.button href="{data.secondary_button_link.url}" target="{data.secondary_button_link.target}" variant="outline" size="lg">{data -> f:render.text(field: 'secondary_button_text')}</s2f:atom.button>
                    </f:if>
                </div>
            </div>
            <div class="hero-asymmetric__media">
                <f:if condition="{data.hero_image}">
                    <f:for each="{data.hero_image}" as="image">
                        <f:image image="{image}" class="hero-asymmetric__image" alt="{data -> f:render.text(field: 'header')}"/>
                    </f:for>
                </f:if>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
