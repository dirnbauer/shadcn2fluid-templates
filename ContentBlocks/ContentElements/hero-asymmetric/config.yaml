name: shadcn2fluid/hero-asymmetric
typeName: shadcn2fluid_heroasymmetric
title: Hero Asymmetric
description: Asymmetric layout hero with offset content and media
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 3
  - identifier: badge_text
    type: Textarea
    rows: 1
    label: Badge Text
  - identifier: hero_image
    type: File
    label: Hero Image
    allowed: common-image-types
    maxitems: 1
  - identifier: primary_button_text
    type: Textarea
    rows: 1
    label: Primary Button Text
  - identifier: primary_button_link
    type: Link
    label: Primary Button Link
  - identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: Secondary Button Text
  - identifier: secondary_button_link
    type: Link
    label: Secondary Button Link
