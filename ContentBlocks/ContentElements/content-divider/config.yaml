name: shadcn2fluid/content-divider
typeName: shadcn2fluid_contentdivider
title: Content Divider
description: Decorative section divider with optional label
group: content
prefixFields: false
fields:
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Divider Style
    onChange: reload
    items:
      - label: Horizontal
        value: horizontal
      - label: With Text
        value: with-text
      - label: Decorative
        value: decorative
    default: horizontal

  - identifier: divider_text
    type: Textarea
    rows: 1
    label: Divider Text
    description: Text displayed on the divider line
    displayCond: 'FIELD:variant:=:with-text'

  - identifier: spacing
    type: Select
    renderType: selectSingle
    label: Spacing
    items:
      - label: Small
        value: sm
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.default'
        value: default
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.large'
        value: lg
    default: default

  - identifier: color
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:color_field'
    items:
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.default'
        value: default
      - label: Muted
        value: muted
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
    default: default
