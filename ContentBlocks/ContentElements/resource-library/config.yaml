name: shadcn2fluid/resource-library
typeName: shadcn2fluid_resourcelibrary
title: Resource Library
description: Resource card library for downloads, guides, and references
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow
  - identifier: items
    type: Collection
    label: Resources
    minItems: 1
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
      - identifier: type_label
        type: Textarea
        rows: 1
        label: Type
      - identifier: description
        type: Textarea
        label: Description
        rows: 2
      - identifier: link
        type: Link
        label: Link
