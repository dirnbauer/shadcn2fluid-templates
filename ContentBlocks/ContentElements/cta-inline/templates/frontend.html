<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-cta-inline" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="cta-inline">
    <s2f:layout.container>
        <div class="cta-inline__bar">
            <div class="cta-inline__text">
                <f:if condition="{data.header}"><h3 class="cta-inline__headline">{data.header}</h3></f:if>
                <f:if condition="{data.description_text}"><p class="cta-inline__description">{data.description_text}</p></f:if>
            </div>
            <f:if condition="{data.cta_text} && {data.cta_link.url}">
                <s2f:atom.button link="{data.cta_link}">{data.cta_text}</s2f:atom.button>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
