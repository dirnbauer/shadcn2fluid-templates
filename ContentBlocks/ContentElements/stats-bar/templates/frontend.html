<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-stats-bar" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="stats-bar">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="stats-bar__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="stats-bar__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="stats-bar__headline">{data.header}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="stats-bar__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="stats-bar__items">
            <f:for each="{data.items}" as="item">
                <div class="stats-bar__item">
                    <div class="stats-bar__meta">
                        <span class="stats-bar__label">{item.label}</span>
                        <span class="stats-bar__value">{item.value}</span>
                    </div>
                    <div class="stats-bar__track">
                        <div class="stats-bar__fill" style="width: {item.percentage}%"></div>
                    </div>
                </div>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
