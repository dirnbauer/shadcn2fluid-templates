<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-pricing-enterprise" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="pricing-enterprise">
    <s2f:layout.container>
        <div class="pricing-enterprise__card">
            <div class="pricing-enterprise__content">
                <f:if condition="{data.eyebrow}">
                    <span class="pricing-enterprise__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="pricing-enterprise__headline">{data.header}</h2>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="pricing-enterprise__description">{data.description}</p>
                </f:if>

                <f:if condition="{data.features_list}">
                    <ul class="pricing-enterprise__features">
                        <f:for each="{data.features_list -> f:split(separator: '\n')}" as="feature">
                            <f:if condition="{feature}">
                                <li class="pricing-enterprise__feature">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
                                    <span>{feature}</span>
                                </li>
                            </f:if>
                        </f:for>
                    </ul>
                </f:if>

                <f:if condition="{data.contact_text} && {data.contact_link.url}">
                    <f:link.typolink parameter="{data.contact_link}" class="pricing-enterprise__button">
                        {data.contact_text}
                    </f:link.typolink>
                </f:if>
            </div>

            <f:if condition="{data.image}">
                <div class="pricing-enterprise__media">
                    <f:for each="{data.image}" as="fileReference">
                        <img src="{f:uri.image(image: fileReference, maxWidth: 480)}" alt="" class="pricing-enterprise__image"/>
                    </f:for>
                </div>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
