<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-logo-cloud" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="logo-cloud">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="logo-cloud__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="logo-cloud__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="logo-cloud__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="logo-cloud__description">{data -> f:render.text(field: 'subheadline')}</p>
                </f:if>
            </header>
        </f:if>

        <div class="logo-cloud__grid logo-cloud__grid--cols-{data.columns -> f:or(alternative: '5')}">
            <f:for each="{data.logo_items}" as="logo">
                <div class="logo-cloud__item">
                    <f:if condition="{logo.link.url}">
                        <f:then>
                            <f:link.typolink parameter="{logo.link}" class="logo-cloud__link" title="{logo -> f:render.text(field: 'name')}">
                                <f:for each="{logo.image}" as="fileReference">
                                    <img src="{f:uri.image(image: fileReference, maxWidth: 220)}" alt="{logo -> f:render.text(field: 'name')}" class="logo-cloud__image"/>
                                </f:for>
                            </f:link.typolink>
                        </f:then>
                        <f:else>
                            <div class="logo-cloud__link" title="{logo -> f:render.text(field: 'name')}">
                                <f:for each="{logo.image}" as="fileReference">
                                    <img src="{f:uri.image(image: fileReference, maxWidth: 220)}" alt="{logo -> f:render.text(field: 'name')}" class="logo-cloud__image"/>
                                </f:for>
                            </div>
                        </f:else>
                    </f:if>
                </div>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
