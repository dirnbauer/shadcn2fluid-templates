name: shadcn2fluid/logo-cloud
typeName: shadcn2fluid_logocloud
title: Logo Cloud
description: Social proof logo grid for customers, partners, or press mentions
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 2

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Logo Columns
    items:
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
      - label: 5 Columns
        value: '5'
      - label: 6 Columns
        value: '6'
    default: '5'

  - identifier: logo_items
    type: Collection
    label: Logos
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Logo Image
        allowed: common-image-types
        maxitems: 1
        required: true

      - identifier: name
        type: Textarea
        rows: 1
        label: Logo Name
        required: true

      - identifier: link
        type: Link
        label: Optional Link
