name: shadcn2fluid/logo-cloud
typeName: shadcn2fluid_logocloud
title: Logo Cloud
description: Social proof logo grid for customers, partners, or press mentions
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:eyebrow'

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 2

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Logo Columns
    items:
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
      - label: 5 Columns
        value: '5'
      - label: 6 Columns
        value: '6'
    default: '5'

  - identifier: logo_items
    type: Collection
    label: Logos
    minItems: 1
    fields:
      - identifier: image
        type: File
        label: Logo Image
        allowed: common-image-types
        maxitems: 1
        required: true

      - identifier: name
        type: Textarea
        rows: 1
        label: Logo Name
        required: true

      - identifier: link
        type: Link
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:optional_link'
