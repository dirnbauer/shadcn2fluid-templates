name: shadcn2fluid/nav-toc
typeName: shadcn2fluid_navtoc
title: Table of Contents
description: Vertical table-of-contents navigation for long-form content
group: navigation
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: items
    type: Collection
    label: TOC Items
    minItems: 1
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:label_field'
      - identifier: anchor
        type: Textarea
        rows: 1
        label: Anchor ID
      - identifier: level
        type: Select
        renderType: selectSingle
        label: Level
        items:
          - label: Heading 2
            value: h2
          - label: Heading 3
            value: h3
        default: h2
