<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-nav-toc" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="nav-toc">
    <aside class="nav-toc__panel" aria-label="Table of contents">
        <f:if condition="{data.header}">
            <h2 class="nav-toc__title">{data.header}</h2>
        </f:if>
        <nav class="nav-toc__nav">
            <ul class="nav-toc__list">
                <f:for each="{data.items}" as="item">
                    <li class="nav-toc__item nav-toc__item--{item.level -> f:or(alternative: 'h2')}">
                        <a href="#{item.anchor}" class="nav-toc__link">{item.label}</a>
                    </li>
                </f:for>
            </ul>
        </nav>
    </aside>
</s2f:layout.section>

</html>
