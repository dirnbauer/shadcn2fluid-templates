name: shadcn2fluid/product-gallery
typeName: shadcn2fluid_productgallery
title: Product Gallery
description: Product image gallery with thumbnails
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: images
    type: File
    label: Product Images
    allowed: common-image-types
    maxitems: 10
    minitems: 1

  - identifier: caption
    type: Textarea
    rows: 1
    label: Gallery Caption

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Thumbnail Columns
    items:
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
      - label: 5 Columns
        value: '5'
      - label: 6 Columns
        value: '6'
    default: '4'
