<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-saas" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-saas">
    <s2f:layout.container>
        <div class="hero-saas__content">
            <f:if condition="{data.badge_text}"><s2f:atom.badge variant="secondary">{data.badge_text}</s2f:atom.badge></f:if>
            <f:if condition="{data.header}"><h1 class="hero-saas__headline">{data.header}</h1></f:if>
            <f:if condition="{data.subheadline}"><p class="hero-saas__subheadline">{data.subheadline}</p></f:if>
            <div class="hero-saas__actions">
                <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                    <s2f:atom.button link="{data.primary_button_link}" size="lg">{data.primary_button_text}</s2f:atom.button>
                </f:if>
                <f:if condition="{data.secondary_button_text} && {data.secondary_button_link.url}">
                    <s2f:atom.button link="{data.secondary_button_link}" variant="outline" size="lg">{data.secondary_button_text}</s2f:atom.button>
                </f:if>
            </div>
        </div>
        <div class="hero-saas__preview">
            <f:if condition="{data.dashboard_image}">
                <f:for each="{data.dashboard_image}" as="image">
                    <f:image image="{image}" class="hero-saas__dashboard" alt="Dashboard preview"/>
                </f:for>
            </f:if>
        </div>
        <f:if condition="{data.logos}">
            <div class="hero-saas__trust">
                <p class="hero-saas__trust-label">Trusted by</p>
                <div class="hero-saas__logos">
                    <f:for each="{data.logos}" as="logo">
                        <span class="hero-saas__logo">{logo.name}</span>
                    </f:for>
                </div>
            </div>
        </f:if>
    </s2f:layout.container>
</s2f:layout.section>
</html>
