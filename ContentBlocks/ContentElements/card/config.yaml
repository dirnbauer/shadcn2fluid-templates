name: shadcn2fluid/card
typeName: shadcn2fluid_card
title: Card
description: Versatile card component with multiple layout variants
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'

  - identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:card_style'
    items:
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.basic'
        value: basic
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.with_image'
        value: image
      - label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:item.horizontal'
        value: horizontal
    default: basic

  - identifier: image
    type: File
    label: Card Image
    allowed: common-image-types
    maxitems: 1
    displayCond: 'FIELD:variant:!=:basic'

  - identifier: description
    type: Textarea
    label: Card Description
    rows: 3

  - identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:badge_text'

  - identifier: link
    type: Link
    label: Card Link

  - identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:button_text'

  - identifier: button_link
    type: Link
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:button_link'
    displayCond: 'FIELD:button_text:!=:'
