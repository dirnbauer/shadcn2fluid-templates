<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-pricing-toggle" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="pricing-toggle">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="pricing-toggle__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="pricing-toggle__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="pricing-toggle__headline">{data.header}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="pricing-toggle__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="pricing-toggle__grid">
            <f:for each="{data.plans}" as="plan">
                <article class="pricing-toggle__plan">
                    <h3 class="pricing-toggle__title">{plan.title}</h3>
                    <div class="pricing-toggle__prices">
                        <p class="pricing-toggle__price">{plan.monthly_price}<span class="pricing-toggle__period">/mo</span></p>
                        <p class="pricing-toggle__price-alt">{plan.yearly_price} yearly</p>
                    </div>
                    <f:if condition="{plan.description}">
                        <p class="pricing-toggle__plan-desc">{plan.description}</p>
                    </f:if>
                    <f:if condition="{plan.features}">
                        <ul class="pricing-toggle__features">
                            <f:for each="{plan.features -> f:split(separator: '\n')}" as="feature">
                                <f:if condition="{feature}">
                                    <li class="pricing-toggle__feature">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
                                        <span>{feature}</span>
                                    </li>
                                </f:if>
                            </f:for>
                        </ul>
                    </f:if>
                    <f:if condition="{plan.button_text} && {plan.button_link.url}">
                        <f:link.typolink parameter="{plan.button_link}" class="pricing-toggle__button">
                            {plan.button_text}
                        </f:link.typolink>
                    </f:if>
                </article>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
