name: shadcn2fluid/sitemap-grid
typeName: shadcn2fluid_sitemapgrid
title: Sitemap Grid
description: Visual sitemap grid with grouped page links
group: footer
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Columns
    items:
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
    default: '4'
  - identifier: groups
    type: Collection
    label: Page Groups
    minItems: 1
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Group Title
        required: true
      - identifier: pages
        type: Textarea
        label: Pages (one per line)
        rows: 5
