<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-cta-minimal" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="cta-minimal">
    <s2f:layout.container>
        <div class="cta-minimal__content">
            <f:if condition="{data.header}"><s2f:typography.heading level="2">{data.header}</s2f:typography.heading></f:if>
            <f:if condition="{data.description_text}"><s2f:typography.text variant="muted">{data.description_text}</s2f:typography.text></f:if>
            <f:if condition="{data.cta_text} && {data.cta_link.url}">
                <f:link.typolink parameter="{data.cta_link}" class="cta-minimal__link">{data.cta_text} &rarr;</f:link.typolink>
            </f:if>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

</html>
