name: shadcn2fluid/content-carousel
typeName: shadcn2fluid_contentcarousel
title: Content Carousel
description: Horizontally scrollable content cards with snap scroll
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:heading'
  - identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  - identifier: items
    type: Collection
    label: Slides
    minItems: 3
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:title'
        required: true
      - identifier: content
        type: Textarea
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:content'
        rows: 3
      - identifier: image
        type: File
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:image'
        allowed: common-image-types
        maxitems: 1
      - identifier: link
        type: Link
        label: 'LLL:EXT:shadcn2fluid_templates/Resources/Private/Language/labels.xlf:link'
