name: shadcn2fluid/content-carousel
typeName: shadcn2fluid_contentcarousel
title: Content Carousel
description: Horizontally scrollable content cards with snap scroll
group: content
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: items
    type: Collection
    label: Slides
    minItems: 3
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
        required: true
      - identifier: content
        type: Textarea
        label: Content
        rows: 3
      - identifier: image
        type: File
        label: Image
        allowed: common-image-types
        maxitems: 1
      - identifier: link
        type: Link
        label: Link
