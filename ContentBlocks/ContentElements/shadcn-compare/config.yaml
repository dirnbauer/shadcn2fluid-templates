name: shadcn2fluid/compare
title: ShadCN Compare
description: Side-by-side comparison block for plans, products, or approaches
group: common
prefixFields: false
fields:
  - identifier: section_layout
    type: Select
    renderType: selectSingle
    label: Template Layout
    items:
      - label: Full Width
        value: full-width
      - label: Two Columns
        value: two-columns
      - label: Stacked
        value: stacked
    default: stacked

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: headline
    type: Text
    label: Section Headline

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 2

  - identifier: left_badge
    type: Text
    label: Left Badge

  - identifier: left_title
    type: Text
    label: Left Title
    required: true

  - identifier: left_description
    type: Textarea
    label: Left Description
    rows: 3

  - identifier: left_points
    type: Textarea
    label: Left Points (one per line)
    rows: 5

  - identifier: left_button_text
    type: Text
    label: Left Button Text

  - identifier: left_button_link
    type: Link
    label: Left Button Link

  - identifier: right_badge
    type: Text
    label: Right Badge

  - identifier: right_title
    type: Text
    label: Right Title
    required: true

  - identifier: right_description
    type: Textarea
    label: Right Description
    rows: 3

  - identifier: right_points
    type: Textarea
    label: Right Points (one per line)
    rows: 5

  - identifier: right_button_text
    type: Text
    label: Right Button Text

  - identifier: right_button_link
    type: Link
    label: Right Button Link
