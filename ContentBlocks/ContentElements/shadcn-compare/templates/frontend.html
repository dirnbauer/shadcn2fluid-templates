<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="shadcn-section shadcn-section--{data.section_layout -> f:or(alternative: 'stacked')} shadcn-compare">
    <div class="shadcn-section__container">
        <f:if condition="{data.eyebrow} || {data.headline} || {data.subheadline}">
            <header class="shadcn-section__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="shadcn-section__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.headline}">
                    <h2 class="shadcn-section__headline">{data.headline}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="shadcn-section__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="shadcn-section__body">
            <div class="shadcn-compare__grid">
                <article class="shadcn-compare__panel shadcn-card">
                    <div class="shadcn-card__content">
                        <f:if condition="{data.left_badge}">
                            <f:render partial="Components/Badge" arguments="{text: data.left_badge, variant: 'outline'}"/>
                        </f:if>
                        <h3 class="shadcn-compare__title">{data.left_title}</h3>
                        <f:if condition="{data.left_description}">
                            <p class="shadcn-compare__description">{data.left_description}</p>
                        </f:if>
                        <f:if condition="{data.left_points}">
                            <ul class="shadcn-compare__points">
                                <f:for each="{data.left_points -> f:split(separator: '\n')}" as="point">
                                    <f:if condition="{point}">
                                        <li class="shadcn-compare__point">{point}</li>
                                    </f:if>
                                </f:for>
                            </ul>
                        </f:if>
                        <f:if condition="{data.left_button_text} && {data.left_button_link.url}">
                            <div class="shadcn-compare__actions">
                                <f:render partial="Components/Button" arguments="{link: data.left_button_link, text: data.left_button_text, variant: 'outline'}"/>
                            </div>
                        </f:if>
                    </div>
                </article>

                <article class="shadcn-compare__panel shadcn-card shadcn-compare__panel--accent">
                    <div class="shadcn-card__content">
                        <f:if condition="{data.right_badge}">
                            <f:render partial="Components/Badge" arguments="{text: data.right_badge}"/>
                        </f:if>
                        <h3 class="shadcn-compare__title">{data.right_title}</h3>
                        <f:if condition="{data.right_description}">
                            <p class="shadcn-compare__description">{data.right_description}</p>
                        </f:if>
                        <f:if condition="{data.right_points}">
                            <ul class="shadcn-compare__points">
                                <f:for each="{data.right_points -> f:split(separator: '\n')}" as="point">
                                    <f:if condition="{point}">
                                        <li class="shadcn-compare__point">{point}</li>
                                    </f:if>
                                </f:for>
                            </ul>
                        </f:if>
                        <f:if condition="{data.right_button_text} && {data.right_button_link.url}">
                            <div class="shadcn-compare__actions">
                                <f:render partial="Components/Button" arguments="{link: data.right_button_link, text: data.right_button_text}"/>
                            </div>
                        </f:if>
                    </div>
                </article>
            </div>
        </div>
    </div>
</section>

</html>
