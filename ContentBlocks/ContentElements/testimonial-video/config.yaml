name: shadcn2fluid/testimonial-video
typeName: shadcn2fluid_testimonialvideo
title: Testimonial Video
description: Video testimonial with quote overlay and author info
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: quote
    type: Textarea
    label: Pull Quote
    rows: 3

  - identifier: video_url
    type: Text
    label: Video URL
    description: YouTube or Vimeo embed URL
    required: true

  - identifier: poster_image
    type: File
    label: Poster Image
    allowed: common-image-types
    maxitems: 1

  - identifier: author_name
    type: Text
    label: Author Name
    required: true

  - identifier: author_title
    type: Text
    label: Author Title

  - identifier: author_company
    type: Text
    label: Company
