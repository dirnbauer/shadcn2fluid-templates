<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-stats" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="stats">
    <s2f:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="stats__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="stats__eyebrow">{data.eyebrow}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="stats__headline">{data.header}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="stats__description">{data.subheadline}</p>
                </f:if>
            </header>
        </f:if>

        <div class="stats__grid stats__grid--cols-{data.columns -> f:or(alternative: '4')}">
            <f:for each="{data.stats}" as="stat">
                <article class="stats__item">
                    <div class="stats__value">{stat.value}</div>
                    <h3 class="stats__label">{stat.label}</h3>
                    <f:if condition="{stat.description}">
                        <p class="stats__item-description">{stat.description}</p>
                    </f:if>
                </article>
            </f:for>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
