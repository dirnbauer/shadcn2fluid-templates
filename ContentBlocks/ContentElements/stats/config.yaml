name: shadcn2fluid/stats
typeName: shadcn2fluid_stats
title: Stats
description: Key figures and KPI sections with responsive cards
group: social-proof
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Text
    label: Eyebrow

  - identifier: subheadline
    type: Textarea
    label: Section Subheadline
    rows: 2

  - identifier: columns
    type: Select
    renderType: selectSingle
    label: Stat Columns
    items:
      - label: 2 Columns
        value: '2'
      - label: 3 Columns
        value: '3'
      - label: 4 Columns
        value: '4'
    default: '4'

  - identifier: stats
    type: Collection
    label: Stats
    minItems: 1
    fields:
      - identifier: value
        type: Text
        label: Value
        required: true

      - identifier: label
        type: Text
        label: Label
        required: true

      - identifier: description
        type: Textarea
        label: Description
        rows: 2
