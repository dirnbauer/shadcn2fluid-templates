name: shadcn2fluid/order-summary
typeName: shadcn2fluid_order-summary
title: Order Summary
description: Order summary card with line items, totals, and CTA
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: items
    type: Collection
    label: Line Items
    minItems: 1
    fields:
      - identifier: name
        type: Text
        label: Item Name
        required: true

      - identifier: quantity
        type: Text
        label: Quantity

      - identifier: price
        type: Text
        label: Price
        required: true

  - identifier: subtotal
    type: Text
    label: Subtotal

  - identifier: discount_label
    type: Text
    label: Discount Label

  - identifier: discount_value
    type: Text
    label: Discount Value

  - identifier: total
    type: Text
    label: Total
    required: true

  - identifier: button_text
    type: Text
    label: Button Text
    default: Proceed to Checkout

  - identifier: button_link
    type: Link
    label: Button Link
