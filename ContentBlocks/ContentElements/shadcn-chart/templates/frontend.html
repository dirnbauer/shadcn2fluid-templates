<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:variable name="chartId" value="chart-{data.uid}"/>
<f:variable name="heightClass" value="shadcn-chart__canvas--{data.chart_height -> f:or(alternative: 'medium')}"/>
<f:variable name="showGridValue">{f:if(condition: data.show_grid, then: 'true', else: 'false')}</f:variable>
<f:variable name="fillTypeValue">{data.fill_type -> f:or(alternative: 'gradient')}</f:variable>

<div class="shadcn-chart shadcn-chart--{data.color_variant -> f:or(alternative: 'primary')}"
     data-chart-data="{data.chart_data -> f:format.htmlspecialchars()}"
     data-show-grid="{showGridValue}"
     data-fill-type="{fillTypeValue}"
     data-chart-id="{chartId}">

    <div class="shadcn-card shadcn-chart__card">
        <f:if condition="{data.title} || {data.description}">
            <div class="shadcn-card__header shadcn-chart__header">
                <f:if condition="{data.title}">
                    <h3 class="shadcn-card__title">{data.title}</h3>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="shadcn-card__description">{data.description}</p>
                </f:if>
            </div>
        </f:if>

        <div class="shadcn-card__content">
            <div class="shadcn-chart__wrapper">
                <f:if condition="{data.y_axis_label}">
                    <div class="shadcn-chart__y-label">
                        <span>{data.y_axis_label}</span>
                    </div>
                </f:if>

                <div class="shadcn-chart__canvas-wrapper">
                    <svg class="shadcn-chart__canvas {heightClass}"
                         viewBox="0 0 500 300"
                         preserveAspectRatio="none"
                         id="{chartId}">
                        <!-- Chart will be rendered by JavaScript -->
                    </svg>

                    <!-- Tooltip -->
                    <div class="shadcn-chart__tooltip" style="display: none;">
                        <div class="shadcn-chart__tooltip-label"></div>
                        <div class="shadcn-chart__tooltip-value"></div>
                    </div>
                </div>

                <f:if condition="{data.x_axis_label}">
                    <div class="shadcn-chart__x-label">
                        <span>{data.x_axis_label}</span>
                    </div>
                </f:if>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    function initShadcnChart(container) {
        const svg = container.querySelector('svg');
        const tooltip = container.querySelector('.shadcn-chart__tooltip');
        const tooltipLabel = tooltip.querySelector('.shadcn-chart__tooltip-label');
        const tooltipValue = tooltip.querySelector('.shadcn-chart__tooltip-value');

        const chartData = container.dataset.chartData || '[]';
        const showGrid = container.dataset.showGrid !== 'false';
        const fillType = container.dataset.fillType || 'gradient';
        const chartId = container.dataset.chartId || 'chart';

        let rawData = [];
        try {
            rawData = JSON.parse(chartData);
            if (!Array.isArray(rawData) || rawData.length === 0) {
                rawData = [{ label: 'No data', value: 0 }];
            }
        } catch (e) {
            console.warn('ShadCN Chart: Invalid JSON data', e);
            rawData = [{ label: 'Error', value: 0 }];
        }

        const padding = { top: 20, right: 20, bottom: 40, left: 50 };
        const width = 500;
        const height = 300;
        const chartWidth = width - padding.left - padding.right;
        const chartHeight = height - padding.top - padding.bottom;

        const values = rawData.map(d => d.value);
        const minValue = 0;
        const maxValue = Math.max(...values) * 1.1 || 1;
        const valueRange = maxValue - minValue || 1;

        // Calculate data points
        const chartPoints = rawData.map((d, i) => ({
            x: padding.left + (i / (rawData.length - 1 || 1)) * chartWidth,
            y: padding.top + chartHeight - ((d.value - minValue) / valueRange) * chartHeight,
            label: d.label,
            value: d.value
        }));

        // Generate paths
        let linePath = '';
        let areaPath = '';
        if (chartPoints.length > 0) {
            linePath = chartPoints.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
            const bottomY = height - padding.bottom;
            areaPath = linePath + ' L' + chartPoints[chartPoints.length - 1].x + ',' + bottomY +
                       ' L' + chartPoints[0].x + ',' + bottomY + ' Z';
        }

        // Generate grid lines
        const gridCount = 5;
        const gridLines = [];
        for (let i = 0; i <= gridCount; i++) {
            const value = minValue + (valueRange * i / gridCount);
            const y = padding.top + chartHeight - (i / gridCount) * chartHeight;
            gridLines.push({ y: y, value: Math.round(value) });
        }

        // Build SVG content
        let svgContent = '';

        // Gradient definition
        svgContent += `<defs>
            <linearGradient id="gradient-${chartId}" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" class="shadcn-chart__gradient-start"/>
                <stop offset="100%" class="shadcn-chart__gradient-end"/>
            </linearGradient>
        </defs>`;

        // Grid lines
        if (showGrid) {
            svgContent += '<g class="shadcn-chart__grid">';
            gridLines.forEach(line => {
                svgContent += `<line x1="${padding.left}" y1="${line.y}" x2="${width - padding.right}" y2="${line.y}" class="shadcn-chart__grid-line"/>`;
            });
            chartPoints.forEach(point => {
                svgContent += `<line x1="${point.x}" y1="${padding.top}" x2="${point.x}" y2="${height - padding.bottom}" class="shadcn-chart__grid-line shadcn-chart__grid-line--vertical"/>`;
            });
            svgContent += '</g>';
        }

        // Y-axis labels
        svgContent += '<g class="shadcn-chart__axis shadcn-chart__axis--y">';
        gridLines.forEach(line => {
            svgContent += `<text x="${padding.left - 8}" y="${line.y + 4}" class="shadcn-chart__axis-label" text-anchor="end">${line.value}</text>`;
        });
        svgContent += '</g>';

        // X-axis labels
        svgContent += '<g class="shadcn-chart__axis shadcn-chart__axis--x">';
        chartPoints.forEach(point => {
            svgContent += `<text x="${point.x}" y="${height - padding.bottom + 20}" class="shadcn-chart__axis-label" text-anchor="middle">${point.label}</text>`;
        });
        svgContent += '</g>';

        // Area fill
        const fillAttr = fillType === 'gradient' ? `url(#gradient-${chartId})` : '';
        svgContent += `<path d="${areaPath}" class="shadcn-chart__area" fill="${fillAttr}"/>`;

        // Line stroke
        svgContent += `<path d="${linePath}" class="shadcn-chart__line" fill="none"/>`;

        // Data points
        svgContent += '<g class="shadcn-chart__points">';
        chartPoints.forEach((point, index) => {
            svgContent += `<circle cx="${point.x}" cy="${point.y}" r="4" class="shadcn-chart__point" data-index="${index}"/>`;
        });
        svgContent += '</g>';

        svg.innerHTML = svgContent;

        // Add tooltip interactivity
        svg.querySelectorAll('.shadcn-chart__point').forEach(circle => {
            const index = parseInt(circle.dataset.index);
            const point = chartPoints[index];

            circle.addEventListener('mouseenter', (e) => {
                const svgRect = svg.getBoundingClientRect();
                const scaleX = svgRect.width / 500;
                const scaleY = svgRect.height / 300;

                tooltipLabel.textContent = point.label;
                tooltipValue.textContent = point.value;
                tooltip.style.display = 'block';
                tooltip.style.left = (point.x * scaleX) + 'px';
                tooltip.style.top = (point.y * scaleY - 10) + 'px';
            });

            circle.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    }

    // Initialize all charts on page load
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.shadcn-chart[data-chart-data]').forEach(initShadcnChart);
    });
})();
</script>

</html>
