name: shadcn2fluid/chart
title: ShadCN Area Chart
description: Interactive area chart with gradient fill, grid lines, and tooltips
group: common
prefixFields: false
fields:
  - identifier: title
    type: Text
    label: Chart Title
    description: Title displayed in the chart card header

  - identifier: description
    type: Textarea
    label: Chart Description
    description: Subtitle or description below the title
    rows: 2

  - identifier: chart_data
    type: Textarea
    label: Chart Data (JSON)
    description: |
      Enter data as JSON array, e.g.:
      [{"label": "Jan", "value": 186}, {"label": "Feb", "value": 305}]
    rows: 6
    required: true

  - identifier: x_axis_label
    type: Text
    label: X-Axis Label
    description: Optional label for the horizontal axis

  - identifier: y_axis_label
    type: Text
    label: Y-Axis Label
    description: Optional label for the vertical axis

  - identifier: color_variant
    type: Select
    renderType: selectSingle
    label: Chart Color
    items:
      - label: Primary (Default)
        value: primary
      - label: Blue
        value: blue
      - label: Green
        value: green
      - label: Orange
        value: orange
      - label: Red
        value: red
    default: primary

  - identifier: show_grid
    type: Checkbox
    label: Show Grid Lines
    default: 1

  - identifier: fill_type
    type: Select
    renderType: selectSingle
    label: Fill Style
    items:
      - label: Gradient (Default)
        value: gradient
      - label: Solid
        value: solid
    default: gradient

  - identifier: chart_height
    type: Select
    renderType: selectSingle
    label: Chart Height
    items:
      - label: Small (200px)
        value: small
      - label: Medium (300px)
        value: medium
      - label: Large (400px)
        value: large
    default: medium
