<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="s2f-chart-heatmap" href="{cb:assetPath()}/frontend.css"/>

<s2f:layout.section class="chart-heatmap-section">
    <s2f:layout.container>
        <div class="chart-heatmap" data-chart-json="{data.chart_data -> f:format.htmlspecialchars()}">
            <div class="chart-heatmap__card">
                <f:if condition="{data.header} || {data.description}">
                    <div class="chart-heatmap__header">
                        <f:if condition="{data.header}">
                            <h3 class="chart-heatmap__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart-heatmap__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                </f:if>
                <div class="chart-heatmap__plot" id="chart-heatmap-{data.uid}"></div>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>

<script>
(function () {
  const uid = {data.uid};
  const plot = document.getElementById('chart-heatmap-' + uid);
  const root = plot && plot.closest('.chart-heatmap');
  if (!plot || !root) return;
  let data;
  try { data = JSON.parse(root.getAttribute('data-chart-json')); } catch (e) { return; }
  const rows = data.rows || [];
  const cols = data.cols || [];
  const values = data.values || [];
  if (!rows.length || !cols.length || !values.length) return;
  const flat = values.reduce(function (a, r) { return a.concat(r); }, []);
  const vmax = Math.max.apply(null, flat);
  const vmin = Math.min.apply(null, flat);
  const span = vmax - vmin || 1;
  const wrap = document.createElement('div');
  wrap.className = 'chart-heatmap__grid';
  wrap.style.gridTemplateColumns = 'auto repeat(' + cols.length + ', minmax(2.5rem,1fr))';
  const corner = document.createElement('div');
  corner.className = 'chart-heatmap__corner';
  wrap.appendChild(corner);
  cols.forEach(function (c) {
    const h = document.createElement('div');
    h.className = 'chart-heatmap__colhead';
    h.textContent = c;
    wrap.appendChild(h);
  });
  rows.forEach(function (rowLabel, ri) {
    const rl = document.createElement('div');
    rl.className = 'chart-heatmap__rowhead';
    rl.textContent = rowLabel;
    wrap.appendChild(rl);
    cols.forEach(function (_, ci) {
      const v = values[ri] && values[ri][ci] != null ? Number(values[ri][ci]) : 0;
      const t = (v - vmin) / span;
      const cell = document.createElement('div');
      cell.className = 'chart-heatmap__cell';
      cell.textContent = String(v);
      cell.style.background = 'color-mix(in srgb, var(--primary) ' + (18 + Math.round(t * 82)) + '%, var(--background))';
      cell.style.color = t > 0.55 ? 'var(--primary-foreground)' : 'var(--foreground)';
      cell.title = rowLabel + ' / ' + cols[ci] + ': ' + v;
      wrap.appendChild(cell);
    });
  });
  plot.appendChild(wrap);
})();
</script>

</html>
