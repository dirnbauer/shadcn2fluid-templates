name: shadcn2fluid/pricing-four-tier
typeName: shadcn2fluid_pricingfourtier
title: Pricing Four Tier
description: Four-plan pricing grid for larger product lineups
group: pricing
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading

  - identifier: eyebrow
    type: Textarea
    rows: 1
    label: Eyebrow

  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2

  - identifier: plans
    type: Collection
    label: Plans
    minItems: 1
    maxItems: 4
    fields:
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
        required: true

      - identifier: price
        type: Textarea
        rows: 1
        label: Price
        required: true

      - identifier: description
        type: Textarea
        label: Description
        rows: 2

      - identifier: features_list
        type: Textarea
        label: Features (one per line)
        rows: 5

      - identifier: featured
        type: Checkbox
        label: Featured

      - identifier: button_text
        type: Textarea
        rows: 1
        label: Button Text
        default: Get Started

      - identifier: button_link
        type: Link
        label: Button Link
