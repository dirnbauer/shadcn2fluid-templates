name: shadcn2fluid/feature-carousel
typeName: shadcn2fluid_featurecarousel
title: Feature Carousel
description: Horizontally scrollable feature cards with snap scroll
group: features
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: Heading
  - identifier: subheadline
    type: Textarea
    label: Subheadline
    rows: 2
  - identifier: items
    type: Collection
    label: Feature Slides
    minItems: 3
    fields:
      - identifier: icon
        type: Textarea
        rows: 1
        label: Icon Emoji or Symbol
      - identifier: title
        type: Textarea
        rows: 1
        label: Title
        required: true
      - identifier: description
        type: Textarea
        label: Description
        rows: 2
      - identifier: link
        type: Link
        label: Link
