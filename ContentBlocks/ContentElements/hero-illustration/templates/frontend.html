<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="s2f-hero-illustration" href="{cb:assetPath()}/frontend.css"/>
<s2f:layout.section class="hero-illustration hero-illustration--image-{data.image_position -> f:or(alternative: 'right')}">
    <s2f:layout.container>
        <div class="hero-illustration__grid">
            <div class="hero-illustration__content">
                <f:if condition="{data.header}"><h1 class="hero-illustration__headline">{data -> f:render.text(field: 'header')}</h1></f:if>
                <f:if condition="{data.subheadline}"><p class="hero-illustration__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
                <div class="hero-illustration__actions">
                    <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                        <s2f:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</s2f:atom.button>
                    </f:if>
                    <f:if condition="{data.secondary_button_text} && {data.secondary_button_link.url}">
                        <s2f:atom.button href="{data.secondary_button_link.url}" target="{data.secondary_button_link.target}" variant="outline" size="lg">{data -> f:render.text(field: 'secondary_button_text')}</s2f:atom.button>
                    </f:if>
                </div>
            </div>
            <div class="hero-illustration__media">
                <f:if condition="{data.illustration}">
                    <f:for each="{data.illustration}" as="image">
                        <f:image image="{image}" class="hero-illustration__image" alt=""/>
                    </f:for>
                </f:if>
            </div>
        </div>
    </s2f:layout.container>
</s2f:layout.section>
</html>
