<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hero Background Image variant icon -->
  
  <!-- Outer frame with image background simulation -->
  <rect x="4" y="8" width="56" height="48" rx="4" fill="#475569" stroke="#334155"/>
  
  <!-- Background pattern to simulate image -->
  <circle cx="52" cy="16" r="6" fill="#64748b" opacity="0.5"/>
  <path d="M4 42 L18 28 L32 38 L48 22 L60 32 L60 52 L4 52 Z" fill="#334155" opacity="0.6"/>
  
  <!-- Overlay effect -->
  <rect x="4" y="8" width="56" height="48" rx="4" fill="#0f172a" opacity="0.4"/>
  
  <!-- Text content on top of overlay -->
  <g>
    <!-- Headline - white/light text -->
    <rect x="12" y="20" width="32" height="5" rx="1" fill="#f8fafc"/>
    
    <!-- Subheadline lines -->
    <rect x="12" y="29" width="28" height="2.5" rx="0.5" fill="#cbd5e1"/>
    <rect x="12" y="34" width="24" height="2.5" rx="0.5" fill="#cbd5e1"/>
    
    <!-- CTA button -->
    <rect x="12" y="44" width="14" height="5" rx="2" fill="#f8fafc"/>
    <rect x="30" y="44" width="14" height="5" rx="2" fill="none" stroke="#f8fafc" stroke-width="1.5"/>
  </g>
</svg>
