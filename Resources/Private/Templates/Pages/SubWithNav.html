<f:layout name="Default" />

<f:section name="Main">
    <div class="min-h-screen bg-background text-foreground font-sans antialiased">
        <div class="container mx-auto px-4 pt-8 md:pt-12">
            <f:render partial="Page/Breadcrumb" arguments="{_all}" optional="{true}" />
        </div>

        <header class="container mx-auto px-4 py-8 md:py-12">
            <h1 class="text-4xl font-bold tracking-tight md:text-5xl">{page.title}</h1>
            <f:if condition="{page.subtitle}">
                <p class="mt-3 text-lg text-muted-foreground">{page.subtitle}</p>
            </f:if>
        </header>

        <div class="container mx-auto px-4 pb-16">
            <div class="grid gap-8 md:grid-cols-[240px_minmax(0,1fr)] lg:gap-12">
                <aside class="md:sticky md:top-20 md:self-start">
                    <f:render partial="Page/SubNav" arguments="{_all}" optional="{true}" />
                </aside>
                <main class="min-w-0">
                    <f:render.contentArea contentArea="{content.main}" />
                </main>
            </div>
        </div>
    </div>
</f:section>
