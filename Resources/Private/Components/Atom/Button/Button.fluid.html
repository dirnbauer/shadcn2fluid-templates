<f:argument name="variant" type="string" optional="{true}" default="default" />
<f:argument name="size" type="string" optional="{true}" default="default" />
<f:argument name="href" type="string" optional="{true}" default="" />
<f:argument name="target" type="string" optional="{true}" default="" />
<f:argument name="class" type="string" optional="{true}" default="" />
<f:argument name="disabled" type="bool" optional="{true}" default="{false}" />
<f:argument name="type" type="string" optional="{true}" default="button" />

<f:variable name="btnClass" value="btn btn--{variant} btn--{size} {class}" />

<f:if condition="{href}">
    <f:then>
        <f:variable name="rel" value="{f:if(condition: '{target} == \'_blank\'', then: 'noopener noreferrer', else: '')}" />
        <a href="{href}" class="{btnClass -> f:format.trim()}" target="{target}" rel="{rel}">
            <f:slot />
        </a>
    </f:then>
    <f:else>
        <button type="{type}" class="{btnClass -> f:format.trim()}" disabled="{disabled}">
            <f:slot />
        </button>
    </f:else>
</f:if>
