<f:argument name="trigger" type="string" />
<f:argument name="open" type="bool" optional="{true}" default="{false}" />
<f:argument name="class" type="string" optional="{true}" default="" />

<div class="accordion__item {class}" data-s2f-accordion-item>
    <button
        type="button"
        class="accordion__trigger"
        aria-expanded="{f:if(condition: open, then: 'true', else: 'false')}"
        data-s2f-accordion-trigger
    >
        <span>{trigger}</span>
        <svg class="accordion__chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion__content{f:if(condition: '!{open}', then: ' accordion__content--hidden')}" data-s2f-accordion-content>
        <div class="accordion__body">
            <f:slot />
        </div>
    </div>
</div>
