<f:argument name="value" type="string" />
<f:argument name="class" type="string" optional="{true}" default="" />

<div
    role="tabpanel"
    x-show="active === '{value}'"
    x-bind:data-state="active === '{value}' ? 'active' : 'inactive'"
    class="mt-2 ring-offset-background focus-visible:outline-hidden focus-visible:ring-3 focus-visible:ring-ring focus-visible:ring-offset-2 {class}"
    data-s2f-tabs-content
    data-value="{value}"
>
    <f:slot />
</div>
