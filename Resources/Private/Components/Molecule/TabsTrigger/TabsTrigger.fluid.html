<f:argument name="value" type="string" />
<f:argument name="class" type="string" optional="{true}" default="" />

<button
    type="button"
    role="tab"
    x-on:click="active = '{value}'"
    x-bind:aria-selected="active === '{value}'"
    x-bind:data-state="active === '{value}' ? 'active' : 'inactive'"
    class="inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-medium ring-offset-background transition-all focus-visible:outline-hidden focus-visible:ring-3 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 data-[state=active]:bg-background data-[state=active]:text-foreground data-[state=active]:shadow-sm {class}"
    data-s2f-tabs-trigger
    data-value="{value}"
>
    <f:slot />
</button>
