<f:argument name="class" type="string" optional="{true}" default="" />
<f:argument name="background" type="string" optional="{true}" default="default" />
<f:argument name="spacing" type="string" optional="{true}" default="default" />
<f:argument name="id" type="string" optional="{true}" />

<section class="section section--bg-{background} section--spacing-{spacing} {class}" id="{id}">
    <f:slot />
</section>
