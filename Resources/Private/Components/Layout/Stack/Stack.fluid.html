<f:argument name="direction" type="string" optional="{true}" default="vertical" />
<f:argument name="gap" type="string" optional="{true}" default="default" />
<f:argument name="align" type="string" optional="{true}" default="stretch" />
<f:argument name="class" type="string" optional="{true}" default="" />

<div class="stack stack--{direction} stack--gap-{gap} stack--align-{align} {class}">
    <f:slot />
</div>
