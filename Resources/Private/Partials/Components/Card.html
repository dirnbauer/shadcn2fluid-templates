<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<!--
    ShadCN Card Component - Fluid Partial
    
    Arguments:
    - title: string - Card title
    - description: string - Card description
    - content: string - Card body content (HTML allowed)
    - footer: string - Card footer content (HTML allowed)
    - class: string - Additional CSS classes
    
    Usage:
    <f:render partial="Components/Card" arguments="{
        title: 'Card Title',
        description: 'Card description text',
        content: '<p>Card content here</p>'
    }"/>
-->

<div class="shadcn-card {class}">
    <f:if condition="{title} || {description}">
        <div class="shadcn-card__header">
            <f:if condition="{title}">
                <h3 class="shadcn-card__title">{title}</h3>
            </f:if>
            <f:if condition="{description}">
                <p class="shadcn-card__description">{description}</p>
            </f:if>
        </div>
    </f:if>
    
    <f:if condition="{content}">
        <div class="shadcn-card__content">
            {content -> f:format.raw()}
        </div>
    </f:if>
    
    <f:if condition="{children}">
        <div class="shadcn-card__content">
            {children -> f:format.raw()}
        </div>
    </f:if>
    
    <f:if condition="{footer}">
        <div class="shadcn-card__footer">
            {footer -> f:format.raw()}
        </div>
    </f:if>
</div>

</html>
