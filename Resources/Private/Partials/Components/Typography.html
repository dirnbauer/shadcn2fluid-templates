<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<!--
    ShadCN Typography Component - Fluid Partial
    
    Arguments:
    - text: string - Text content
    - tag: string - HTML tag to use (h1, h2, h3, h4, p, span)
    - variant: string - Typography style variant (h1, h2, h3, h4, p, lead, large, small, muted)
    - class: string - Additional CSS classes
    
    Usage:
    <f:render partial="Components/Typography" arguments="{
        text: 'Hello World',
        tag: 'h1',
        variant: 'h1'
    }"/>
-->

<f:variable name="variantClass" value="{f:switch(expression: variant, cases: {
    'h1': 'shadcn-h1',
    'h2': 'shadcn-h2',
    'h3': 'shadcn-h3',
    'h4': 'shadcn-h4',
    'p': 'shadcn-p',
    'lead': 'shadcn-lead',
    'large': 'shadcn-large',
    'small': 'shadcn-small',
    'muted': 'shadcn-muted'
}, default: 'shadcn-p')}"/>

<f:variable name="htmlTag" value="{tag -> f:or(default: 'p')}"/>

<f:switch expression="{htmlTag}">
    <f:case value="h1">
        <h1 class="{variantClass} {class}">{text}<f:if condition="{children}">{children -> f:format.raw()}</f:if></h1>
    </f:case>
    <f:case value="h2">
        <h2 class="{variantClass} {class}">{text}<f:if condition="{children}">{children -> f:format.raw()}</f:if></h2>
    </f:case>
    <f:case value="h3">
        <h3 class="{variantClass} {class}">{text}<f:if condition="{children}">{children -> f:format.raw()}</f:if></h3>
    </f:case>
    <f:case value="h4">
        <h4 class="{variantClass} {class}">{text}<f:if condition="{children}">{children -> f:format.raw()}</f:if></h4>
    </f:case>
    <f:case value="span">
        <span class="{variantClass} {class}">{text}<f:if condition="{children}">{children -> f:format.raw()}</f:if></span>
    </f:case>
    <f:defaultCase>
        <p class="{variantClass} {class}">{text}<f:if condition="{children}">{children -> f:format.raw()}</f:if></p>
    </f:defaultCase>
</f:switch>

</html>
